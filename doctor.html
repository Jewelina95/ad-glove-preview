<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>医生端 · AD 智能手套</title>
<style>
:root {
  --bg: #f8fafc;
  --card: #ffffff;
  --text: #0f172a;
  --muted: #64748b;
  --teal: #0f766e;
  --teal-bg: #f0fdfa;
  --border: #e2e8f0;
  --green: #16a34a;
  --green-bg: #dcfce7;
  --yellow: #ca8a04;
  --yellow-bg: #fef9c3;
  --orange: #ea580c;
  --orange-bg: #ffedd5;
  --red: #dc2626;
  --red-bg: #fee2e2;
  --purple: #7c3aed;
  --purple-bg: #f5f3ff;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  font-size: 14px;
}
.nav {
  background: white;
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.nav .brand { font-weight: 700; color: var(--teal); }
.nav .pills { margin-left: auto; display: flex; gap: 8px; }
.nav .pills a {
  padding: 6px 14px; border-radius: 999px;
  text-decoration: none; font-size: 13px; color: var(--muted);
  border: 1px solid var(--border);
}
.nav .pills a.active { background: var(--rose, #be123c); color: white; border-color: var(--rose, #be123c); }

.layout {
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: 0;
  min-height: calc(100vh - 56px);
}

/* ===== 左侧：患者列表 ===== */
.sidebar {
  background: white;
  border-right: 1px solid var(--border);
  padding: 18px 14px;
  overflow-y: auto;
}
.sidebar h3 {
  margin: 0 0 12px;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
}
.search {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 13px;
  margin-bottom: 12px;
}
.patient-card {
  padding: 12px 14px;
  border-radius: 8px;
  cursor: pointer;
  margin-bottom: 6px;
  border: 1px solid transparent;
  transition: all 0.15s;
}
.patient-card:hover { background: var(--bg); }
.patient-card.active {
  background: var(--teal-bg);
  border-color: var(--teal);
}
.patient-card .name { font-weight: 600; font-size: 14px; }
.patient-card .meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
.patient-card .stage {
  display: inline-block; font-size: 10px; font-weight: 700;
  padding: 2px 7px; border-radius: 4px; margin-top: 4px;
}
.stage-scd { background: var(--green-bg); color: #14532d; }
.stage-mci { background: var(--yellow-bg); color: #713f12; }
.stage-mild { background: var(--orange-bg); color: #7c2d12; }
.stage-mod { background: var(--red-bg); color: #7f1d1d; }
.stage-sev { background: #1c1917; color: white; }

.patient-card .alert-dot {
  display: inline-block; width: 6px; height: 6px; border-radius: 50%;
  background: var(--red); margin-left: 4px; vertical-align: middle;
}

/* ===== 右侧：主面板 ===== */
.main {
  padding: 22px 26px 60px;
  overflow-y: auto;
}

.patient-bar {
  background: white;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 24px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.patient-bar .pname { font-size: 18px; font-weight: 700; }
.patient-bar .pmeta { color: var(--muted); font-size: 13px; }
.patient-bar .stat { padding: 0 14px; border-left: 1px solid var(--border); }
.patient-bar .stat:first-of-type { border-left: 0; padding-left: 0; }
.patient-bar .stat .v { font-size: 16px; font-weight: 600; }
.patient-bar .stat .l { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }

.section {
  background: white;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px 20px;
  margin-bottom: 14px;
}
.section h2 {
  margin: 0 0 14px;
  font-size: 14px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section h2 .desc {
  font-weight: 400; color: var(--muted); font-size: 12px;
}
.section h2 .badge {
  font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 700;
  text-transform: uppercase;
}

/* 分期条 */
.stage-bar {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 4px;
  margin-bottom: 10px;
}
.stage-cell {
  padding: 10px 6px;
  text-align: center;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  background: var(--bg);
  color: var(--muted);
  border: 2px solid transparent;
}
.stage-cell.active {
  background: var(--orange-bg);
  color: var(--orange);
  border-color: var(--orange);
  box-shadow: 0 2px 8px rgba(234,88,12,0.2);
}
.stage-cell .lbl { font-size: 11px; opacity: 0.8; }
.stage-cell .stg { font-size: 14px; font-weight: 700; }
.confidence-bar {
  height: 6px; background: var(--border); border-radius: 3px;
  overflow: hidden; margin: 8px 0 4px;
}
.confidence-bar > div {
  height: 100%; background: var(--orange); transition: width 0.5s;
}
.conf-label {
  display: flex; justify-content: space-between;
  font-size: 12px; color: var(--muted);
}

/* Cadence 行 */
.cadence-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}
.cad {
  padding: 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg);
}
.cad .ic { font-size: 18px; }
.cad .name { font-size: 12px; font-weight: 600; margin-top: 4px; }
.cad .v { font-size: 13px; margin-top: 4px; }
.cad.alert { background: var(--red-bg); border-color: var(--red); }
.cad.warn { background: var(--yellow-bg); border-color: var(--yellow); }
.cad.ok { background: var(--green-bg); border-color: var(--green); }

/* Multi-modal 指标 */
.modal-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}
.modal-block {
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
  background: var(--bg);
}
.modal-block h4 {
  margin: 0 0 8px;
  font-size: 13px;
  display: flex; gap: 6px; align-items: center;
}
.modal-block .row {
  display: flex; justify-content: space-between;
  font-size: 12px;
  padding: 3px 0;
  border-bottom: 1px dashed var(--border);
}
.modal-block .row:last-child { border-bottom: 0; }
.modal-block .row .k { color: var(--muted); }
.modal-block .row .v { font-weight: 600; font-family: ui-monospace, monospace; }
.modal-block .row .v.flag-warn { color: var(--orange); }
.modal-block .row .v.flag-bad { color: var(--red); }
.modal-block .row .v.flag-ok { color: var(--green); }
.modal-block .src {
  font-size: 10px; color: var(--muted); margin-top: 6px;
  font-style: italic;
}

/* Reasoning chain */
.reason-chain {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.reason-step {
  padding: 12px 14px;
  border-left: 3px solid var(--teal);
  background: var(--teal-bg);
  border-radius: 0 8px 8px 0;
}
.reason-step .num {
  display: inline-block; width: 22px; height: 22px;
  border-radius: 50%; background: var(--teal); color: white;
  text-align: center; font-weight: 700; font-size: 12px;
  line-height: 22px; margin-right: 8px;
}
.reason-step .title { font-weight: 600; font-size: 13px; }
.reason-step .body { margin-top: 6px; font-size: 13px; color: var(--text); }
.reason-step .cite {
  margin-top: 8px;
  font-size: 11px;
  display: flex; flex-wrap: wrap; gap: 6px;
}
.reason-step .cite a {
  background: white; border: 1px solid var(--border);
  padding: 2px 8px; border-radius: 4px;
  text-decoration: none; color: var(--teal);
  font-family: ui-monospace, monospace;
}
.reason-step .cite a:hover { background: var(--teal); color: white; border-color: var(--teal); }
.reason-step.warn { border-left-color: var(--orange); background: var(--orange-bg); }
.reason-step.warn .num { background: var(--orange); }
.reason-step.warn .cite a { color: var(--orange); }
.reason-step.warn .cite a:hover { background: var(--orange); }

/* BPSD 7 行 */
.bpsd-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
}
.bpsd-cell {
  padding: 10px 6px;
  text-align: center;
  border-radius: 6px;
  border: 1px solid var(--border);
}
.bpsd-cell .nm { font-size: 11px; font-weight: 600; }
.bpsd-cell .lv {
  display: inline-block; padding: 2px 8px; border-radius: 4px;
  font-size: 10px; font-weight: 700; margin-top: 4px;
}
.bpsd-cell.lv-ok { background: var(--green-bg); }
.bpsd-cell.lv-ok .lv { background: var(--green); color: white; }
.bpsd-cell.lv-warn { background: var(--yellow-bg); }
.bpsd-cell.lv-warn .lv { background: var(--yellow); color: white; }
.bpsd-cell.lv-bad { background: var(--red-bg); border-color: var(--red); }
.bpsd-cell.lv-bad .lv { background: var(--red); color: white; }
.bpsd-cell .nb { font-size: 10px; color: var(--muted); margin-top: 2px; }

/* Actions */
.action-row {
  display: flex; flex-wrap: wrap; gap: 8px;
}
.btn {
  padding: 9px 16px; border-radius: 8px;
  border: 1px solid var(--border); background: white;
  font-size: 13px; font-weight: 500;
  cursor: pointer; font-family: inherit;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn:hover { background: var(--bg); }
.btn.primary { background: var(--teal); color: white; border-color: var(--teal); }
.btn.primary:hover { background: #115e59; }
.btn.warn { background: var(--orange); color: white; border-color: var(--orange); }
.btn.warn:hover { background: #c2410c; }

/* Sparkline */
.spark {
  height: 30px; width: 100%; margin-top: 6px;
}
.spark path { fill: none; stroke: var(--teal); stroke-width: 1.5; }
.spark .dot { fill: var(--teal); }

#toast {
  position: fixed; bottom: 30px; right: 30px;
  background: var(--text); color: white; padding: 12px 20px; border-radius: 8px;
  font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none;
  max-width: 360px; z-index: 100;
}
#toast.show { opacity: 0.95; }

/* ===== Modal ===== */
#modal {
  position: fixed; inset: 0; background: rgba(15,23,42,0.55);
  display: none; align-items: center; justify-content: center;
  z-index: 200; padding: 20px;
}
#modal.show { display: flex; }
#modal .panel {
  background: white; border-radius: 12px;
  width: min(820px, 100%); max-height: 90vh;
  display: flex; flex-direction: column;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  overflow: hidden;
}
#modal .panel-head {
  padding: 16px 22px; border-bottom: 1px solid var(--border);
  background: var(--bg);
  display: flex; align-items: center; gap: 12px;
}
#modal .panel-head .title { font-size: 16px; font-weight: 700; flex: 1; }
#modal .panel-head .x {
  background: transparent; border: 1px solid var(--border);
  padding: 4px 12px; border-radius: 6px; cursor: pointer; font-family: inherit;
}
#modal .panel-head .x:hover { background: white; }
#modal .panel-body { padding: 22px 26px; overflow-y: auto; flex: 1; font-size: 14px; }
#modal h3 { margin: 16px 0 8px; font-size: 14px; }
#modal h3:first-child { margin-top: 0; }
#modal table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: 13px; }
#modal th, #modal td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
#modal th { background: var(--bg); font-weight: 600; }
#modal .kv { display: grid; grid-template-columns: 130px 1fr; gap: 4px 12px; font-size: 13px; margin: 6px 0 12px; }
#modal .kv .k { color: var(--muted); }
#modal .badge-inline {
  display: inline-block; font-size: 11px; padding: 1px 7px;
  border-radius: 4px; font-weight: 600;
}
#modal .b-warn { background: var(--orange-bg); color: var(--orange); }
#modal .b-bad  { background: var(--red-bg); color: var(--red); }
#modal .b-ok   { background: var(--green-bg); color: var(--green); }
#modal ul { padding-left: 20px; }
#modal li { margin: 4px 0; }
#modal .cite-row {
  font-size: 12px; color: var(--muted); margin-top: 8px;
  padding: 8px 12px; background: var(--bg); border-radius: 6px;
}
#modal .cite-row a { color: var(--teal); text-decoration: none; }
#modal pre {
  background: var(--bg); padding: 12px; border-radius: 6px;
  font-size: 12px; overflow-x: auto;
  font-family: ui-monospace, monospace;
}

/* clickable hover */
.cad, .modal-block, .bpsd-cell { cursor: pointer; transition: transform 0.1s, box-shadow 0.1s; }
.cad:hover, .modal-block:hover, .bpsd-cell:hover {
  transform: translateY(-1px); box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

/* ===== Sensor Board ===== */
.sensor-board-head {
  display: flex; gap: 14px; align-items: center; flex-wrap: wrap;
  padding: 8px 12px; background: #0f172a; color: #e2e8f0;
  border-radius: 8px 8px 0 0; font-size: 12px;
  font-family: ui-monospace, monospace;
}
.sb-dot {
  display: inline-block; width: 8px; height: 8px; border-radius: 50%;
  margin-right: 6px; vertical-align: middle;
}
.sb-dot.live { background: #22c55e; box-shadow: 0 0 8px #22c55e; animation: pulse 1.4s ease-in-out infinite; }
.sb-dot.rec { background: #ef4444; animation: pulse 1s ease-in-out infinite; }
.sb-dot.off { background: #64748b; }
@keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: 0.4 } }
.sensor-board-head .sep { opacity: 0.3; }
.sensor-board-head .sr { color: #5eead4; }
.sensor-board-head .pid { color: #fbbf24; }

.channel-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  background: #0f172a;
  padding: 10px;
  border-radius: 0 0 8px 8px;
}
.ch-card {
  background: #1e293b;
  border-radius: 6px;
  padding: 10px 12px;
  border: 1px solid #334155;
  position: relative;
  overflow: hidden;
}
.ch-card .ch-name {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 11px; color: #94a3b8; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.04em;
}
.ch-card .ch-tag {
  font-size: 9px; padding: 1px 5px; border-radius: 3px;
  background: #334155; color: #cbd5e1;
}
.ch-card .ch-tag.alert { background: #7f1d1d; color: #fecaca; }
.ch-card .ch-val {
  font-size: 20px; font-weight: 700; color: #f1f5f9;
  font-family: ui-monospace, monospace;
  margin: 4px 0 2px;
}
.ch-card .ch-val small { font-size: 12px; color: #64748b; font-weight: 400; }
.ch-card .ch-wave {
  width: 100%; height: 36px; margin-top: 4px;
}
.ch-card .ch-wave path {
  fill: none; stroke-width: 1.5; stroke-linejoin: round; stroke-linecap: round;
}
.ch-eda  path { stroke: #f59e0b; }
.ch-ppg  path { stroke: #ef4444; }
.ch-hr   path { stroke: #ec4899; }
.ch-spo2 path { stroke: #06b6d4; }
.ch-imu  path { stroke: #8b5cf6; }
.ch-aud  path { stroke: #10b981; }
.ch-card.flag-alert { border-color: #ef4444; box-shadow: 0 0 0 1px #ef4444; }
.ch-card.flag-alert .ch-val { color: #fecaca; }
.ch-card.flag-warn { border-color: #f59e0b; }

@media (max-width: 1100px) { .channel-grid { grid-template-columns: repeat(2, 1fr); } }

/* alert banner */
.alert-banner {
  background: var(--red-bg);
  border: 1px solid var(--red);
  color: #7f1d1d;
  padding: 10px 16px;
  border-radius: 8px;
  margin-bottom: 14px;
  display: flex;
  gap: 10px;
  align-items: center;
  font-size: 13px;
}
.alert-banner.warn { background: var(--yellow-bg); border-color: var(--yellow); color: #713f12; }
.alert-banner.ok { background: var(--green-bg); border-color: var(--green); color: #14532d; }

@media (max-width: 900px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { border-right: 0; border-bottom: 1px solid var(--border); }
  .modal-grid { grid-template-columns: 1fr 1fr; }
  .cadence-grid { grid-template-columns: 1fr 1fr; }
  .bpsd-grid { grid-template-columns: repeat(4, 1fr); }
}
</style>
</head>
<body>

<nav class="nav">
  <span class="brand">🧤 AD 手套</span>
  <div class="pills">
    <a href="index.html">首页</a>
    <a href="patient.html">患者端</a>
    <a href="doctor.html" class="active" style="background:#be123c;color:white;border-color:#be123c">医生端</a>
    <a href="index.html" title="实时面板需本机跑 backend，回首页查看说明">实时（本机）</a>
  </div>
</nav>

<div class="layout">

  <!-- ===== 左侧：患者列表 ===== -->
  <aside class="sidebar">
    <h3>患者列表 (4 案例)</h3>
    <input class="search" placeholder="🔍 搜索 ID / 姓名" />

    <div id="patientList"></div>

    <div style="margin-top:14px; padding:10px 12px; background:#faf5ff; border:1px dashed #c4b5fd; border-radius:8px;">
      <div style="font-size:11px;color:#6b21a8;font-weight:600;margin-bottom:6px">📤 上传你的 progression.csv</div>
      <input type="file" id="customCsv" accept=".csv" onchange="handleCustomUpload(event)" style="font-size:11px;width:100%">
      <div style="font-size:10px;color:var(--muted);margin-top:4px">从 ad-synthetic-generator 或自己的纵向数据导入</div>
    </div>

    <div style="margin-top:14px; padding:10px 12px; background:var(--bg); border-radius:8px; font-size:11px; color:var(--muted)">
      <strong style="color:var(--text)">数据来源：</strong><br>
      🧠 MIND = <a href="https://github.com/Jewelina95/ad-mind-pipeline" target="_blank" style="color:var(--teal)">ad-mind-pipeline</a><br>
      📚 WIKI = <a href="https://jewelina95.github.io/ad-wiki-pages/" target="_blank" style="color:var(--teal)">ad-wiki-pages KB</a>
    </div>
  </aside>

  <!-- ===== 右侧：主面板 ===== -->
  <main class="main" id="mainPanel">
    <!-- 由 JS 渲染 -->
  </main>

</div>

<div id="toast"></div>

<!-- 详情 Modal -->
<div id="modal" onclick="if(event.target===this) closeModal()">
  <div class="panel">
    <div class="panel-head">
      <span class="title" id="modalTitle">详情</span>
      <button class="x" onclick="closeModal()">关闭 ✕</button>
    </div>
    <div class="panel-body" id="modalBody"></div>
  </div>
</div>

<script>
// ===== Mock 患者数据 =====
const PATIENTS = {
  "P001": {

    stage: "MCI", stageIdx: 1, confidence: 0.78,

        ["RMSSD", "26 ms", "flag-warn"],

      ], src: "wiki/concepts/ppg_hrv.md"},

        ["双任务代价", "+18%", "flag-warn"]
      ], src: "wiki/concepts/imu_gait.md + Verghese MCR"},
      eda: { name: "EDA", icon: "💧", rows: [
        ["SCL 均值", "4.2 µS", ""],
        ["SCR 频率", "1.8/min", ""],
        ["NS-SCR", "0.7/min", ""],
        ["唤醒度", "中等", ""]
      ], src: "wiki/concepts/eda_signal.md"},
      voice: { name: "语音", icon: "🎤", rows: [
        ["语速", "3.1 字/秒", "flag-warn"],
        ["停顿率", "22%", "flag-warn"],
        ["TTR", "0.61", ""],
        ["F0 抖动", "1.2%", ""]
      ], src: "TAUKADIAL 2024 + ADReSS"}
    },
    reasoning: [

const mindCache = {};
async function fetchJsonl(url) {
  try {
    const r = await fetch(url);
    if (!r.ok) return [];
    const txt = await r.text();
    return txt.trim().split('\n').filter(Boolean).map(l => JSON.parse(l));
  } catch (e) { return []; }
}
async function fetchMindPatient(id) {
  if (mindCache[id]) return mindCache[id];
  const [persona, dashboard, clinical, physio, behavior, bpsd, ema, notes] = await Promise.all([
    fetch(`${MIND_BASE}/${id}/persona.json`).then(r => r.json()),
    fetch(`${MIND_BASE}/${id}/dashboard.json`).then(r => r.json()),
    fetch(`${MIND_BASE}/${id}/insights_clinical.json`).then(r => r.json()),
    fetch(`${MIND_BASE}/${id}/insights_physio.json`).then(r => r.json()),
    fetch(`${MIND_BASE}/${id}/insights_behavior.json`).then(r => r.json()),
    fetchJsonl(`${MIND_BASE}/${id}/bpsd_events.jsonl`),
    fetchJsonl(`${MIND_BASE}/${id}/ema.jsonl`),
    fetchJsonl(`${MIND_BASE}/${id}/notes.jsonl`)
  ]);
  mindCache[id] = { persona, dashboard, clinical, physio, behavior, bpsd, ema, notes };
  return mindCache[id];
}

function kbToWiki(code) {
  // 提取前缀 (e.g. "MCR_CRITERIA_001" → "MCR_CRITERIA")
  const prefix = code.replace(/_\d+$/, "");
  const m = KB_TO_WIKI[prefix];
  if (!m) return { url: null, label: code };
  return { url: `${WIKI_BASE_URL}/${m.page}.md`, label: m.label, code };
}

async function selectMindPatient(id) {
  const main = document.getElementById('mainPanel');
  document.querySelectorAll('.patient-card').forEach(el => el.classList.toggle('active', el.dataset.id === id));
  if (sensorTimer) clearInterval(sensorTimer);
  currentMindId = id;
  main.innerHTML = '<div style="padding:60px;text-align:center;color:var(--muted)"><div style="font-size:32px">⏳</div><div style="margin-top:10px">从 ad-mind-pipeline + ad-wiki-pages 实时拉取 ' + id + ' …</div></div>';

  try {
    const data = await fetchMindPatient(id);
    renderCurrentView(id, data);
  } catch (e) {
    main.innerHTML = `<div style="padding:30px"><div class="alert-banner">加载失败：${e.message}<br>请确认 https://github.com/Jewelina95/ad-mind-pipeline 是 public</div></div>`;

function switchMindView(view) {
  currentMindView = view;
  if (currentMindId && mindCache[currentMindId]) {
    renderCurrentView(currentMindId, mindCache[currentMindId]);
  }
}

function renderCurrentView(id, data) {
  if (currentMindView === 'wiki') {
    renderWikiView(id, data);
  } else {
    renderMindView(id, data);
  }
  // 渲染完后启动 sensor 流（按 alert 等级选 profile）
  const alert = data.dashboard.alert_level;
  const profile = alert === 'red' ? 'alert' : alert === 'yellow' ? 'mci' : 'healthy';
  startSensorBoard(profile);
}

// ===== 3 cadence 报告 (1h / 7d / 30d) - 两个视角共用入口、不同内容 =====
function renderCadenceRow(id, data) {
  const c = data.clinical;
  const bpsd = data.bpsd || [];
  const ema = data.ema || [];
  const lastEma = ema.length ? ema[ema.length - 1] : null;
  const day30Alert = data.dashboard.alert_level;

  // 每个 cadence 的预览文字
  const cads = [
    {
      k: '1h', ic: '⏱', label: '小时报告 · Hourly',
      summary: lastEma ? `mood ${lastEma.mood ?? '-'} · anxiety ${lastEma.anxiety ?? '-'} · sleep ${lastEma.sleep ?? '-'}` : '待采集 EMA',
      level: lastEma && (lastEma.mood < 4 || lastEma.anxiety > 6) ? 'warn' : 'ok'
    },
    {
      k: '7d', ic: '📊', label: '周报 · Weekly',
      summary: bpsd.length > 0 ? `本周末 ${bpsd.slice(-1)[0].type || 'BPSD'} · ${c.intervention_priority?.length || 0} 项干预` : '稳定',
      level: bpsd.length > 1 ? 'warn' : 'ok'
    },
    {
      k: '30d', ic: '📈', label: '月报 · Monthly',
      summary: `${c.stage_inclination} · 置信 ${(c.stage_confidence*100).toFixed(0)}%`,
      level: day30Alert === 'red' ? 'alert' : day30Alert === 'yellow' ? 'warn' : 'ok'
    }
  ];

  const frameworkLabel = currentMindView === 'wiki' ? '📚 WIKI 风' : '🧠 MIND 风';
  const frameworkColor = currentMindView === 'wiki' ? 'var(--teal)' : '#7c3aed';

  return `
    <div class="section">
      <h2>📋 ${frameworkLabel} 三层报告 <span class="desc">同一份数据 · 3 个时间尺度的不同结构化汇报 · 点击展开完整内容</span></h2>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
        ${cads.map(cd => `
          <div class="cad ${cd.level}" onclick="openMindCadenceReport('${id}','${cd.k}')" style="text-align:left;padding:14px;border-width:2px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
              <span style="font-size:13px;font-weight:700;color:${frameworkColor}">${cd.ic} ${cd.label}</span>
              <span style="font-size:10px;background:${cd.level==='alert'?'#fee2e2':cd.level==='warn'?'#fef3c7':'#dcfce7'};color:${cd.level==='alert'?'#7f1d1d':cd.level==='warn'?'#713f12':'#14532d'};padding:1px 6px;border-radius:3px">${cd.level==='alert'?'急':cd.level==='warn'?'关注':'OK'}</span>
            </div>
            <div style="font-size:11px;color:var(--muted);line-height:1.5">${cd.summary}</div>
            <div style="font-size:10px;color:${frameworkColor};margin-top:8px;font-weight:600">→ 查看完整报告</div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

  const data = mindCache[id];

// ===== WIKI 视角 (同一份 fetch 数据，按 wiki KB 框架重组) =====
function renderWikiView(id, data) {
  const meta = MIND_PATIENTS_META[id];
  const d = data.dashboard;
  const c = data.clinical;
  const ph = data.physio;
  const bh = data.behavior;

  // 按 wiki 框架: Unified Clinical Agent 推理链
  // 把 physio + behavior insights 合并成 reasoning chain，每条挂 wiki 链接
  const allInsights = [...ph.insights, ...bh.insights];

  // 由 supporting_knowledge 推断 wiki 引用
  const reasoningHtml = allInsights.map((ins, i) => {
    const kbLinks = (ins.supporting_knowledge || []).map(code => {
      const w = kbToWiki(code);
      return w.url ? `<a href="${w.url}" target="_blank">${w.label}</a>` : `<span>${w.label}</span>`;
    }).join('');
    const isWarn = ins.confidence >= 0.8;
    return `
      <div class="reason-step ${isWarn ? 'warn' : ''}">
        <span class="num">${i+1}</span>
        <span class="title">${ins.observation}</span>
        <div class="body">
          <strong>临床含义：</strong>${ins.clinical_implication}
          ${ins.differential ? `<br><strong style="color:var(--muted)">鉴别：</strong><span style="color:var(--muted)">${ins.differential}</span>` : ''}
        </div>
        <div class="cite">
          <a href="#" onclick="event.preventDefault();alert('Confidence: ${ins.confidence}\\nDomain: ${ins.domain}\\nID: ${ins.id}')">conf ${(ins.confidence*100).toFixed(0)}%</a>
          ${kbLinks}
        </div>
      </div>
    `;
  }).join('');

  // 把数字按 wiki concept 分组（HRV / 步态 / EDA / 语音 / BPSD）
  const physioByDomain = {
    "步态": ph.insights.filter(i => i.supporting_knowledge.some(k => k.startsWith('SENSOR_IMU') || k.startsWith('NORM_GAIT') || k.startsWith('MCR'))),
    "HRV": ph.insights.filter(i => i.supporting_knowledge.some(k => k.startsWith('SENSOR_PPG'))),
    "EDA": ph.insights.filter(i => i.supporting_knowledge.some(k => k.startsWith('SENSOR_EDA'))),
  };
  const physioGridHtml = Object.entries(physioByDomain).filter(([_,arr]) => arr.length).map(([dom, arr]) => `
    <div class="modal-block" style="cursor:default">
      <h4>${dom==='步态'?'🚶':dom==='HRV'?'❤️':'💧'} ${dom}</h4>
      ${arr.map(i => `<div style="font-size:12px;padding:4px 0;border-bottom:1px dashed var(--border)">
        ${i.observation}
      </div>`).join('')}
      <div class="src">📚 <a href="${WIKI_BASE_URL}/${dom==='HRV'?'ppg_hrv':dom==='EDA'?'eda_signal':'imu_gait'}.md" target="_blank">wiki/concepts/${dom==='HRV'?'ppg_hrv':dom==='EDA'?'eda_signal':'imu_gait'}.md ↗</a></div>
    </div>
  `).join('');

  // BPSD 7 网格 — 从 behavior insights 推断
  const bpsdMap = {激越:'ok', 焦虑:'ok', 淡漠:'ok', 抑郁:'ok', 睡眠:'ok', 日落:'ok', 游荡:'ok'};
  bh.insights.forEach(i => {
    i.supporting_knowledge.forEach(k => {

// 打开 report.md modal（懒加载）
async function openMindReportModal(id) {
  openModal(`📄 ${id} · report.md`, '<div style="padding:30px;text-align:center;color:var(--muted)">⏳ 加载中…</div>');
  try {
    const r = await fetch(`${MIND_BASE}/${id}/report.md`);
    const md = await r.text();
    const html = md
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/^# (.+)$/gm, '<h2>$1</h2>')
      .replace(/^## (.+)$/gm, '<h3>$1</h3>')
      .replace(/^### (.+)$/gm, '<h4>$1</h4>')
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\n\n/g, '</p><p>')
      .replace(/\n/g, '<br>');
    document.getElementById('modalBody').innerHTML = `<p>${html}</p>
      <div class="cite-row">📂 <a href="https://github.com/Jewelina95/ad-mind-pipeline/blob/main/data_v2/${id}/report.md" target="_blank">GitHub 原文 ↗</a></div>`;
  } catch (e) {
    document.getElementById('modalBody').innerHTML = `<div style="color:var(--red)">加载失败：${e.message}</div>`;
  }
}

// ===== 上传 progression.csv =====
function handleCustomUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const text = ev.target.result;
      const lines = text.trim().split(/\r?\n/);
      if (lines.length < 2) throw new Error("CSV 至少 1 行表头 + 1 行数据");
      const header = lines[0].split(',').map(x => x.trim());
      const rows = lines.slice(1).map(l => {
        const cells = l.split(',').map(x => x.trim());
        const obj = {};
        header.forEach((h, i) => obj[h] = cells[i]);
        return obj;
      });
      customPatient = { name: file.name, header, rows };
      renderCustomPatient();
      document.querySelectorAll('.patient-card').forEach(el => el.classList.remove('active'));
    } catch (err) {
      alert('CSV 解析失败：' + err.message);
    }
  };
  reader.readAsText(file);
}

// 上传 CSV 的 3 cadence 报告（小时/周/月）
function openCustomCadenceReport(cadence) {
  if (!customPatient) return;
  const cp = customPatient;
  const rows = cp.rows;
  function pickCol(names) { for (const n of names) if (n in rows[0]) return n; return null; }
  const colGait = pickCol(['gait_speed','gait_speed_normal','step_speed','speed']);
  const colMmse = pickCol(['mmse','mmse_score','MMSE']);
  const colMood = pickCol(['mood','ema_mood','mood_score']);
  const colHrv  = pickCol(['hrv_sdnn','hrv','sdnn','SDNN']);
  const last = rows[rows.length - 1], first = rows[0];
  let title, html;

  if (cadence === '1h') {
    title = `⏱ 小时报告 · ${cp.name}`;
    const wikiHits = [];
    if (colGait && parseFloat(last[colGait]) < 1.0) wikiHits.push(`步速 ${parseFloat(last[colGait]).toFixed(2)} m/s < 1.0 → MCR 可疑 (<a href="${WIKI_BASE_URL}/mcr_criteria.md" target="_blank">mcr_criteria ↗</a>)`);
    if (colMood && parseFloat(last[colMood]) < 4) wikiHits.push(`mood ${last[colMood]}/10 < 4 → 抑郁风险 (<a href="${WIKI_BASE_URL}/bpsd_depression.md" target="_blank">bpsd_depression ↗</a>)`);
    if (colHrv && parseFloat(last[colHrv]) < 35) wikiHits.push(`HRV SDNN ${last[colHrv]} ms < 35 → 自主神经异常 (<a href="${WIKI_BASE_URL}/ppg_hrv.md" target="_blank">ppg_hrv ↗</a>)`);
    html = `
      <h3>最近时间点快照</h3>
      <table><tr><th>字段</th><th>值</th></tr>
        ${Object.entries(last).slice(0, 18).map(([k,v]) => `<tr><td>${k}</td><td><code>${v}</code></td></tr>`).join('')}
      </table>
      <h3>WIKI KB 实时规则命中</h3>
      ${wikiHits.length ? `<ul>${wikiHits.map(h => `<li>${h}</li>`).join('')}</ul>` : '<p style="color:var(--muted)">无明显异常命中</p>'}
    `;
  } else if (cadence === '7d') {
    title = `📊 周报 · ${cp.name}`;
    const week = rows.slice(-7);
    const trend = (col) => {
      if (!col || week.length < 2) return null;
      const a = parseFloat(week[0][col]), b = parseFloat(week[week.length-1][col]);
      if (isNaN(a) || isNaN(b)) return null;
      return { col, a, b, delta: b-a, dpct: a ? ((b-a)/Math.abs(a)*100).toFixed(1) : 'n/a' };
    };
    const trends = [colGait,colMmse,colMood,colHrv].map(trend).filter(Boolean);
    html = `
      <h3>最近 7 天趋势</h3>
      ${trends.length ? `<table>
        <tr><th>指标</th><th>7 天前</th><th>本日</th><th>变化</th></tr>
        ${trends.map(t => `<tr><td>${t.col}</td><td><code>${t.a.toFixed(2)}</code></td><td><code>${t.b.toFixed(2)}</code></td>
          <td><span class="badge-inline ${Math.abs(t.delta) > Math.abs(t.a)*0.05 ? 'b-warn' : 'b-ok'}">${t.delta>=0?'+':''}${t.delta.toFixed(2)} (${t.dpct}%)</span></td></tr>`).join('')}
      </table>` : '<p>未识别关键指标</p>'}
      <h3>WIKI 周窗规则</h3>
      <ul>
        <li>步速周降 > 5% → 标记 (<a href="${WIKI_BASE_URL}/imu_gait.md" target="_blank">imu_gait ↗</a>)</li>
        <li>mood 周降 > 3 分 → BPSD 抑郁加重</li>
        <li>HRV 周降 > 10% → 自主神经持续退化</li>
      </ul>
    `;
  } else if (cadence === '30d') {
    title = `📈 月报 · ${cp.name}`;
    const trend = (col) => {
      if (!col) return null;
      const a = parseFloat(first[col]), b = parseFloat(last[col]);
      if (isNaN(a) || isNaN(b)) return null;
      return { col, a, b, delta: b-a, dpct: a ? ((b-a)/Math.abs(a)*100).toFixed(1) : 'n/a' };
    };
    const trends = [colGait,colMmse,colMood,colHrv].map(trend).filter(Boolean);
    let stage = 'SCD';
    if (colGait) { const g = parseFloat(last[colGait]); if (g < 0.8) stage = 'Mild'; else if (g < 1.0) stage = 'MCI'; }
    if (colMmse) { const m = parseFloat(last[colMmse]); if (m < 18) stage = 'Moderate'; else if (m < 24) stage = 'Mild'; else if (m < 27) stage = 'MCI'; }
    html = `
      <h3>📈 ${cp.rows.length} 天全周期 · WIKI 综合判断</h3>
      <div class="kv">
        <span class="k">数据点</span><span>${rows.length}</span>
        <span class="k">推断分期</span><span><span class="badge-inline b-warn">${stage}</span></span>
      </div>
      <h3>全周期变化</h3>
      ${trends.length ? `<table>
        <tr><th>指标</th><th>首日</th><th>末日</th><th>变化</th><th>wiki 阈值</th></tr>
        ${trends.map(t => {
          let thr = '';
          if (t.col === colGait) thr = `<a href="${WIKI_BASE_URL}/imu_gait.md" target="_blank">< 1.0 m/s ↗</a>`;
          else if (t.col === colMmse) thr = `<a href="${WIKI_BASE_URL}/ad_staging.md" target="_blank">24/27 切点 ↗</a>`;
          else if (t.col === colMood) thr = `<a href="${WIKI_BASE_URL}/bpsd_depression.md" target="_blank">< 4 ↗</a>`;
          else if (t.col === colHrv) thr = `<a href="${WIKI_BASE_URL}/ppg_hrv.md" target="_blank">< 35 ms ↗</a>`;
          return `<tr><td>${t.col}</td><td><code>${t.a.toFixed(2)}</code></td><td><code>${t.b.toFixed(2)}</code></td>
            <td><span class="badge-inline ${Math.abs(t.delta) > Math.abs(t.a)*0.1 ? 'b-bad' : Math.abs(t.delta) > Math.abs(t.a)*0.05 ? 'b-warn' : 'b-ok'}">${t.delta>=0?'+':''}${t.delta.toFixed(2)} (${t.dpct}%)</span></td>
            <td style="font-size:11px">${thr}</td></tr>`;

// ===== Sensor Board 动画 =====
const BUF_LEN = 80;     // 80 个采样点的滚动 buffer
const TICK_MS = 100;    // 100ms 一帧
let sensorBuffers = {};
let sensorTimer = null;
let sensorPhase = 0;

function getChFlagClass(profile, chId) {
  const p = SENSOR_PROFILES[profile] && SENSOR_PROFILES[profile][chId];
  if (!p || !p.flag) return '';
  return p.flag === 'alert' ? 'flag-alert' : 'flag-warn';
}

function startSensorBoard(profileName) {
  const profile = SENSOR_PROFILES[profileName];
  if (!profile) return;
  // 初始化 buffer
  sensorBuffers = {};
  CHANNELS.forEach(c => { sensorBuffers[c.id] = new Array(BUF_LEN).fill(profile[c.id].base); });
  if (sensorTimer) clearInterval(sensorTimer);
  sensorPhase = 0;

  sensorTimer = setInterval(() => {
    sensorPhase += 1;
    const t = sensorPhase * TICK_MS / 1000; // 秒
    CHANNELS.forEach(c => {
      const cfg = profile[c.id];
      let v;
      if (c.id === "PPG-IR") {
        // PPG 振荡 = sin(2π·HR/60·t) + 噪声
        const hr = cfg.hr || 70;
        v = Math.sin(2 * Math.PI * (hr/60) * t) * 0.7 + (Math.random()-0.5) * cfg.noise;
      } else if (c.id === "IMU-AX" || c.id === "IMU-AY") {
        // 步态周期 ~1Hz
        v = cfg.base + Math.sin(2 * Math.PI * 1.0 * t + (c.id==="IMU-AY"?Math.PI/2:0)) * 0.3
            + (Math.random()-0.5) * cfg.noise;
      } else if (c.id === "IMU-AZ") {
        v = cfg.base + Math.sin(2 * Math.PI * 1.0 * t) * 0.15 + (Math.random()-0.5) * cfg.noise;
      } else if (c.id === "EDA") {
        // 慢漂移 + SCR 偶发尖峰
        const drift = Math.sin(2 * Math.PI * 0.05 * t) * 0.4;
        const scr = (profileName === 'alert' && Math.random() < 0.05) ? 2.5 : 0;
        v = cfg.base + drift + scr + (Math.random()-0.5) * cfg.noise;
      } else if (c.id === "AUDIO") {
        // 语音活动模拟（间歇性突起）
        const speech = Math.random() < (profileName==='healthy'?0.35:0.15) ? 25 : 0;
        v = cfg.base + speech + (Math.random()-0.5) * cfg.noise;
      } else {
        // HR / SpO2 慢变
        v = cfg.base + Math.sin(2 * Math.PI * 0.1 * t) * cfg.noise * 0.5
            + (Math.random()-0.5) * cfg.noise;
      }
      sensorBuffers[c.id].push(v);
      sensorBuffers[c.id].shift();

      // 更新数值显示
      const valEl = document.getElementById('val-' + c.id);
      if (valEl) {
        const fmt = c.id === "PPG-IR" ? v.toFixed(2)
                  : c.id === "HR" || c.id === "AUDIO" ? Math.round(v)
                  : c.id === "SpO2" ? v.toFixed(1)
                  : v.toFixed(2);
        valEl.innerHTML = `${fmt} <small>${c.unit}</small>`;
      }

      // 更新波形 path
      const pathEl = document.getElementById('wave-' + c.id);
      if (pathEl) {
        const buf = sensorBuffers[c.id];
        const lo = c.bandMin, hi = c.bandMax;
        const w = 240, h = 36;
        const d = buf.map((val, i) => {
          const x = (i / (buf.length - 1)) * w;
          const y = h - ((val - lo) / (hi - lo)) * h;
          const yc = Math.max(1, Math.min(h-1, y));
          return `${i===0?'M':'L'}${x.toFixed(1)},${yc.toFixed(1)}`;
        }).join(' ');
        pathEl.setAttribute('d', d);
      }
    });

    // 更新时钟
    const clk = document.getElementById('sbClock');
    if (clk) clk.textContent = new Date().toTimeString().slice(0,8);
  }, TICK_MS);
}

  { nm:"焦虑", desc:"反复询问、不安、坐立不宁", signal:"NS-SCR > 2/min、HRV 显著下降、语速加快", warn:"环境改变 / 家人离开后 30 分钟内", wiki:"bpsd_anxiety"},
  { nm:"淡漠", desc:"兴趣丧失、动机降低、社交退缩", signal:"日活动量 < 基线 -40%、语音事件 < 5/h、面无表情", warn:"持续 ≥ 2 周达到诊断标准", wiki:"bpsd_apathy"},
  { nm:"抑郁", desc:"情绪低落、悲伤、自责", signal:"语速变慢、F0 单调、夜醒次数增加、晨起 HR 偏低", warn:"自杀念头需立即转诊", wiki:"bpsd_depression"},
  { nm:"睡眠", desc:"入睡困难、夜醒、白天嗜睡", signal:"PPG 夜间 HR 高、IMU 翻身次数 > 12/夜、白天打盹", warn:"持续 < 5h 立即升级", wiki:"bpsd_sleep_disorder"},
  { nm:"日落综合征", desc:"傍晚混乱加剧、激越发作", signal:"15-19 时段 EDA/HR 异常模式 + IMU 不安", warn:"光疗 + 环境调整可缓解", wiki:"bpsd_sundowning"},
  { nm:"游荡", desc:"无目的徘徊、走失风险", signal:"GPS / IMU 长时间无目的位移、夜间外出", warn:"高风险患者需 GPS 定位 + 门禁", wiki:"bpsd_wandering"}
];
function openBpsdModal(idx, pid) {
  const d = BPSD_DETAILS[idx];
  const p = PATIENTS[pid];
  const b = p.bpsd[idx];
  const lvText = b[1]==='ok'?'正常':b[1]==='warn'?'关注':'高风险';
  const html = `
    <h3>${d.nm} · 当前 <span class="badge-inline ${b[1]==='bad'?'b-bad':b[1]==='warn'?'b-warn':'b-ok'}">${lvText} (${b[2]})</span></h3>
    <div class="kv">
      <span class="k">临床表现</span><span>${d.desc}</span>
      <span class="k">传感器特征</span><span>${d.signal}</span>
      <span class="k">关键提醒</span><span>${d.warn}</span>
    </div>
    <h3>本患者最近 30d ${d.nm} 事件</h3>
    <p style="color:var(--muted)">${b[1]==='bad' ? '检测到 8 次明显事件，集中在 16:30-18:00 时段' : b[1]==='warn' ? '检测到 2-3 次轻度事件' : '无明显事件'}</p>
    <div class="cite-row">📚 <a href="https://jewelina95.github.io/ad-wiki-pages/wiki/concepts/${d.wiki}.md" target="_blank">wiki/concepts/${d.wiki}.md ↗</a> · NPI 量表对应维度</div>
  `;
  openModal(`${d.nm} · ${p.name}`, html);
}

// ----- 周报 / 干预 / 转诊 弹窗 -----
function openReportModal(kind, pid) {
  const p = PATIENTS[pid];
  const today = new Date().toISOString().slice(0,10);
  let title, html;

  if (kind === 'clinical') {
    title = `📋 临床周报 · ${p.name}`;
    html = `
      <pre style="white-space:pre-wrap">CLINICAL WEEKLY REPORT
==============================================
Patient: ${p.name} (${p.id}) · ${p.age}岁 ${p.sex}
Reporting period: ${today} (last 7 days)
Glove worn: ${p.onGloveSince}
Generated by: Unified Clinical Agent (Claude)
==============================================

ASSESSMENT
  Stage: ${p.stage} (confidence ${(p.confidence*100).toFixed(0)}%)
  Last MMSE: ${p.lastMMSE} · CDR: ${p.lastCDR}
  Trend (9w): ${p.sparkData[0]} → ${p.sparkData[p.sparkData.length-1]}

KEY METRICS (week mean ± SD)
  HRV SDNN     : ${p.metrics.hrv.rows[0][1]}
  Gait speed   : ${p.metrics.gait.rows[0][1]}
  Stride var   : ${p.metrics.gait.rows[2][1]}
  EDA SCL      : ${p.metrics.eda.rows[0][1]}
  Speech rate  : ${p.metrics.voice.rows[0][1]}
  Pause ratio  : ${p.metrics.voice.rows[1][1]}

REASONING CHAIN
${p.reasoning.map((r, i) => `  ${i+1}. ${r.title}\n     ${r.body}`).join('\n\n')}

BPSD WEEKLY SCORECARD
${p.bpsd.map(b => `  ${b[0].padEnd(4,' ')}: ${b[1].toUpperCase().padEnd(5,' ')} (${b[2]})`).join('\n')}

RECOMMENDATIONS
${p.stage === 'MCI' || p.stage === 'Mild' ? '  ▸ 建议下一步：血液 p-tau217 + 神经内科会诊\n  ▸ 考虑做 amyloid PET 确认 AT(N) 阳性\n' : ''}${p.alert ? '  ▸ 急性 BPSD 风险：本周触发 8 次干预\n  ▸ 评估 Lecanemab 期间 ARIA 监测\n' : ''}  ▸ 继续每周纵向监测，关注步态/语音/HRV 三联指标
  ▸ 下次评估：${new Date(Date.now()+7*86400000).toISOString().slice(0,10)}

FOOTER
  报告基于 multi-modal sensor fusion + clinical KB
  不替代金标准诊断 (PET / CSF / 血液 p-tau217)</pre>
      <div class="cite-row">📚 报告模板见 <a href="https://jewelina95.github.io/ad-wiki-pages/wiki/agents/care_management_agent.md" target="_blank">care_management_agent ↗</a></div>
    `;
  } else if (kind === 'family') {
    title = `📄 家属周报 · ${p.name}`;
    const stage = p.stage === 'Healthy' ? '健康' : p.stage === 'MCI' ? '轻度认知下降' : p.stage === 'Mild' ? '轻度阿尔兹海默' : '中度阿尔兹海默';
    const lightColor = p.alert ? '🔴' : (p.stage === 'MCI' || p.stage === 'Mild') ? '🟡' : '🟢';
    html = `
      <h3>${lightColor} 这一周整体：${p.alert ? '需要注意' : (p.stage==='MCI'||p.stage==='Mild') ? '基本稳定，但有几点要关注' : '状态良好'}</h3>
      <div class="kv">
        <span class="k">本周阶段</span><span>${stage}</span>
        <span class="k">睡眠</span><span>平均 ${p.cadence['1d'].v.includes('h') ? p.cadence['1d'].v.replace('睡眠 ','') : '6.5h'}（${p.cadence['1d'].level==='ok'?'OK':'偏少'}）</span>
        <span class="k">活动</span><span>${p.cadence['7d'].level==='ok'?'正常':'有所减少'}</span>
        <span class="k">情绪</span><span>${p.alert ? '本周有几次明显波动' : '相对平稳'}</span>
      </div>
      <h3>建议家属做的事</h3>
      <ul>
        ${p.alert ? '<li>傍晚 4-7 点尽量陪伴，避免环境过度刺激</li>' : ''}
        ${p.stage==='MCI' || p.stage==='Mild' ? '<li>多和长辈聊天、回忆往事，鼓励参与日常事务</li>' : ''}
        <li>记得提醒按时吃药、定时活动</li>
        <li>下次体检时把这份周报给医生看</li>
      </ul>
      <h3>什么时候需要立刻联系医生</h3>
      <ul>
        <li>突然加重的混乱 / 攻击行为</li>
        <li>连续 2 天以上几乎不睡 / 不吃</li>
        <li>跌倒、失去方向感、走失</li>
      </ul>
      <div class="cite-row">这份报告由智能手套自动生成 · 仅供日常参考 · 不替代医生诊断</div>
    `;
  } else if (kind === 'goldstandard') {
    title = `🩺 金标准检查推荐 · ${p.name}`;
    html = `
      <h3>为什么推荐做金标准</h3>
      <p>本患者综合多模态指标已达到 <strong>${p.stage}</strong>（置信度 ${(p.confidence*100).toFixed(0)}%），但手套系统是<strong>临床推断</strong>，不能替代生物学确诊。Lecanemab / Donanemab 治疗窗口仅对 MCI / 轻度 AD 有效，需要 amyloid 阳性确认。</p>
      <h3>推荐流程（按优先顺序）</h3>
      <table>
        <tr><th>检查</th><th>价格</th><th>侵入性</th><th>诊断价值</th></tr>
        <tr><td>血液 p-tau217</td><td>~¥1500</td><td>抽血</td><td>amyloid 阳性 PPV ~85%</td></tr>
        <tr><td>amyloid PET</td><td>~¥6000-10000</td><td>静脉注射</td><td>金标准</td></tr>
        <tr><td>CSF Aβ42/40 + p-tau</td><td>~¥3000</td><td>腰穿</td><td>金标准</td></tr>
        <tr><td>结构 MRI 海马</td><td>~¥1200</td><td>无</td><td>辅助证据</td></tr>
      </table>
      <h3>如何转诊</h3>
      <ul>
        <li>导出本患者 30 天纵向数据 → PDF 报告（按本周报模板）</li>
        <li>转诊至神经内科 / 记忆障碍门诊</li>
        <li>携带：手套报告 + 既往 MMSE/MoCA 记录 + 用药清单</li>
      </ul>
      <div class="cite-row">📚 <a href="https://jewelina95.github.io/ad-wiki-pages/wiki/concepts/atn_framework.md" target="_blank">AT(N) 框架 ↗</a> · Jack 2024 修订标准</div>
    `;
  } else if (kind === 'intervention') {
    title = `🎵 干预方案 · ${p.name}`;
    html = `
      <h3>当前急性事件</h3>
      <p style="color:var(--red)"><strong>${p.alertText || '无'}</strong></p>
      <h3>立即执行（按顺序）</h3>
      <ol>
        <li><strong>音乐疗法</strong>：通过手套扬声器播放患者偏好曲目（50年代老歌）· 30 分钟 · 监测 EDA 是否回落</li>
        <li><strong>语音引导深呼吸</strong>：5 分钟引导式 4-7-8 呼吸法</li>
        <li><strong>通知主要看护人</strong>：短信 + App 推送，提示陪伴</li>
        <li><strong>环境调整</strong>：降低光线、关闭电视等强刺激</li>
      </ol>
      <h3>30 分钟后检查</h3>
      <ul>
        <li>EDA SCL 是否回落至基线 ±20% 内</li>
        <li>HR 是否 < 80 bpm</li>
        <li>如未缓解 → 升级至看护人现场处理 + 考虑非紧急医疗咨询</li>
      </ul>
      <h3>近期模式</h3>
      <p>该患者过去 30 天有 8 次类似事件，集中在 16:30-18:00 时段（日落综合征窗口）。建议在此时段提前预防（散步、家属陪伴、固定怀旧节目）。</p>
      <div class="cite-row">📚 <a href="https://jewelina95.github.io/ad-wiki-pages/wiki/agents/intervention_agent.md" target="_blank">intervention_agent ↗</a> · Iaboni 2022 BPSD 干预证据</div>
    `;
  }
  openModal(title, html);
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
}
