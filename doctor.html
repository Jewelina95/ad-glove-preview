<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="doctor.title">医生端 · AD 智能手套</title>
<link rel="icon" href="assets/i-thread-logo.svg" type="image/svg+xml">
<link rel="stylesheet" href="assets/brand.css">
<style>
:root {
  --bg: #f6f7fc;
  --card: #ffffff;
  --text: #0f172a;
  --muted: #64748b;
  /* logo blue family — replaces former teal */
  --teal: #1e3a8a;
  --teal-bg: #eef0ff;
  --border: #e2e8f0;
  --green: #16a34a;
  --green-bg: #dcfce7;
  --yellow: #ca8a04;
  --yellow-bg: #fef9c3;
  /* logo magenta family — replaces former orange-as-active and rose */
  --orange: #ec008c;
  --orange-bg: #fdebf6;
  --red: #dc2626;
  --red-bg: #fee2e2;
  --purple: #7c3aed;
  --purple-bg: #f5f3ff;
  --rose: #ec008c;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  font-size: 14px;
}
/* legacy .nav rules retained for backwards compat — actual nav is .brandbar from brand.css */

.layout {
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: 0;
  min-height: calc(100vh - 56px);
}

/* ===== 左侧：患者列表 ===== */
.sidebar {
  background: white;
  border-right: 1px solid var(--border);
  padding: 18px 14px;
  overflow-y: auto;
}
.sidebar h3 {
  margin: 0 0 12px;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
}
.search {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 13px;
  margin-bottom: 12px;
}
.patient-card {
  padding: 12px 14px;
  border-radius: 8px;
  cursor: pointer;
  margin-bottom: 6px;
  border: 1px solid transparent;
  transition: all 0.15s;
}
.patient-card:hover { background: var(--bg); }
.patient-card.active {
  background: var(--teal-bg);
  border-color: var(--teal);
}
.patient-card .name { font-weight: 600; font-size: 14px; }
.patient-card .meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
.patient-card .stage {
  display: inline-block; font-size: 10px; font-weight: 700;
  padding: 2px 7px; border-radius: 4px; margin-top: 4px;
}
.stage-scd { background: var(--green-bg); color: #14532d; }
.stage-mci { background: var(--yellow-bg); color: #713f12; }
.stage-mild { background: var(--orange-bg); color: #7c2d12; }
.stage-mod { background: var(--red-bg); color: #7f1d1d; }
.stage-sev { background: #1c1917; color: white; }

.patient-card .alert-dot {
  display: inline-block; width: 6px; height: 6px; border-radius: 50%;
  background: var(--red); margin-left: 4px; vertical-align: middle;
}

/* ===== 右侧：主面板 ===== */
.main {
  padding: 22px 26px 60px;
  overflow-y: auto;
}

.patient-bar {
  background: white;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 24px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.patient-bar .pname { font-size: 18px; font-weight: 700; }
.patient-bar .pmeta { color: var(--muted); font-size: 13px; }
.patient-bar .stat { padding: 0 14px; border-left: 1px solid var(--border); }
.patient-bar .stat:first-of-type { border-left: 0; padding-left: 0; }
.patient-bar .stat .v { font-size: 16px; font-weight: 600; }
.patient-bar .stat .l { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }

.section {
  background: white;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px 20px;
  margin-bottom: 14px;
}
.section h2 {
  margin: 0 0 14px;
  font-size: 14px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section h2 .desc {
  font-weight: 400; color: var(--muted); font-size: 12px;
}
.section h2 .badge {
  font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 700;
  text-transform: uppercase;
}

/* 分期条 */
.stage-bar {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 4px;
  margin-bottom: 10px;
}
.stage-cell {
  padding: 10px 6px;
  text-align: center;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  background: var(--bg);
  color: var(--muted);
  border: 2px solid transparent;
}
.stage-cell.active {
  background: var(--orange-bg);
  color: var(--orange);
  border-color: var(--orange);
  box-shadow: 0 2px 8px rgba(234,88,12,0.2);
}
.stage-cell .lbl { font-size: 11px; opacity: 0.8; }
.stage-cell .stg { font-size: 14px; font-weight: 700; }
.confidence-bar {
  height: 6px; background: var(--border); border-radius: 3px;
  overflow: hidden; margin: 8px 0 4px;
}
.confidence-bar > div {
  height: 100%; background: var(--orange); transition: width 0.5s;
}
.conf-label {
  display: flex; justify-content: space-between;
  font-size: 12px; color: var(--muted);
}

/* Cadence 行 */
.cadence-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}
.cad {
  padding: 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg);
}
.cad .ic { font-size: 18px; }
.cad .name { font-size: 12px; font-weight: 600; margin-top: 4px; }
.cad .v { font-size: 13px; margin-top: 4px; }
.cad.alert { background: var(--red-bg); border-color: var(--red); }
.cad.warn { background: var(--yellow-bg); border-color: var(--yellow); }
.cad.ok { background: var(--green-bg); border-color: var(--green); }

/* Multi-modal 指标 */
.modal-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}
.modal-block {
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
  background: var(--bg);
}
.modal-block h4 {
  margin: 0 0 8px;
  font-size: 13px;
  display: flex; gap: 6px; align-items: center;
}
.modal-block .row {
  display: flex; justify-content: space-between;
  font-size: 12px;
  padding: 3px 0;
  border-bottom: 1px dashed var(--border);
}
.modal-block .row:last-child { border-bottom: 0; }
.modal-block .row .k { color: var(--muted); }
.modal-block .row .v { font-weight: 600; font-family: ui-monospace, monospace; }
.modal-block .row .v.flag-warn { color: var(--orange); }
.modal-block .row .v.flag-bad { color: var(--red); }
.modal-block .row .v.flag-ok { color: var(--green); }
.modal-block .src {
  font-size: 10px; color: var(--muted); margin-top: 6px;
  font-style: italic;
}

/* Reasoning chain */
.reason-chain {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.reason-step {
  padding: 12px 14px;
  border-left: 3px solid var(--teal);
  background: var(--teal-bg);
  border-radius: 0 8px 8px 0;
}
.reason-step .num {
  display: inline-block; width: 22px; height: 22px;
  border-radius: 50%; background: var(--teal); color: white;
  text-align: center; font-weight: 700; font-size: 12px;
  line-height: 22px; margin-right: 8px;
}
.reason-step .title { font-weight: 600; font-size: 13px; }
.reason-step .body { margin-top: 6px; font-size: 13px; color: var(--text); }
.reason-step .cite {
  margin-top: 8px;
  font-size: 11px;
  display: flex; flex-wrap: wrap; gap: 6px;
}
.reason-step .cite a {
  background: white; border: 1px solid var(--border);
  padding: 2px 8px; border-radius: 4px;
  text-decoration: none; color: var(--teal);
  font-family: ui-monospace, monospace;
}
.reason-step .cite a:hover { background: var(--teal); color: white; border-color: var(--teal); }
.reason-step.warn { border-left-color: var(--orange); background: var(--orange-bg); }
.reason-step.warn .num { background: var(--orange); }
.reason-step.warn .cite a { color: var(--orange); }
.reason-step.warn .cite a:hover { background: var(--orange); }

/* BPSD 7 行 */
.bpsd-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
}
.bpsd-cell {
  padding: 10px 6px;
  text-align: center;
  border-radius: 6px;
  border: 1px solid var(--border);
}
.bpsd-cell .nm { font-size: 11px; font-weight: 600; }
.bpsd-cell .lv {
  display: inline-block; padding: 2px 8px; border-radius: 4px;
  font-size: 10px; font-weight: 700; margin-top: 4px;
}
.bpsd-cell.lv-ok { background: var(--green-bg); }
.bpsd-cell.lv-ok .lv { background: var(--green); color: white; }
.bpsd-cell.lv-warn { background: var(--yellow-bg); }
.bpsd-cell.lv-warn .lv { background: var(--yellow); color: white; }
.bpsd-cell.lv-bad { background: var(--red-bg); border-color: var(--red); }
.bpsd-cell.lv-bad .lv { background: var(--red); color: white; }
.bpsd-cell .nb { font-size: 10px; color: var(--muted); margin-top: 2px; }

/* Actions */
.action-row {
  display: flex; flex-wrap: wrap; gap: 8px;
}
.btn {
  padding: 9px 16px; border-radius: 8px;
  border: 1px solid var(--border); background: white;
  font-size: 13px; font-weight: 500;
  cursor: pointer; font-family: inherit;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn:hover { background: var(--bg); }
.btn.primary { background: var(--teal); color: white; border-color: var(--teal); }
.btn.primary:hover { background: #115e59; }
.btn.warn { background: var(--orange); color: white; border-color: var(--orange); }
.btn.warn:hover { background: #c2410c; }

/* Sparkline */
.spark {
  height: 30px; width: 100%; margin-top: 6px;
}
.spark path { fill: none; stroke: var(--teal); stroke-width: 1.5; }
.spark .dot { fill: var(--teal); }

#toast {
  position: fixed; bottom: 30px; right: 30px;
  background: var(--text); color: white; padding: 12px 20px; border-radius: 8px;
  font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none;
  max-width: 360px; z-index: 100;
}
#toast.show { opacity: 0.95; }

/* ===== Modal ===== */
#modal {
  position: fixed; inset: 0; background: rgba(15,23,42,0.55);
  display: none; align-items: center; justify-content: center;
  z-index: 200; padding: 20px;
}
#modal.show { display: flex; }
#modal .panel {
  background: white; border-radius: 12px;
  width: min(820px, 100%); max-height: 90vh;
  display: flex; flex-direction: column;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  overflow: hidden;
}
#modal .panel-head {
  padding: 16px 22px; border-bottom: 1px solid var(--border);
  background: var(--bg);
  display: flex; align-items: center; gap: 12px;
}
#modal .panel-head .title { font-size: 16px; font-weight: 700; flex: 1; }
#modal .panel-head .x {
  background: transparent; border: 1px solid var(--border);
  padding: 4px 12px; border-radius: 6px; cursor: pointer; font-family: inherit;
}
#modal .panel-head .x:hover { background: white; }
#modal .panel-body { padding: 22px 26px; overflow-y: auto; flex: 1; font-size: 14px; }
#modal h3 { margin: 16px 0 8px; font-size: 14px; }
#modal h3:first-child { margin-top: 0; }
#modal table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: 13px; }
#modal th, #modal td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
#modal th { background: var(--bg); font-weight: 600; }
#modal .kv { display: grid; grid-template-columns: 130px 1fr; gap: 4px 12px; font-size: 13px; margin: 6px 0 12px; }
#modal .kv .k { color: var(--muted); }
#modal .badge-inline {
  display: inline-block; font-size: 11px; padding: 1px 7px;
  border-radius: 4px; font-weight: 600;
}
#modal .b-warn { background: var(--orange-bg); color: var(--orange); }
#modal .b-bad  { background: var(--red-bg); color: var(--red); }
#modal .b-ok   { background: var(--green-bg); color: var(--green); }
#modal ul { padding-left: 20px; }
#modal li { margin: 4px 0; }
#modal .cite-row {
  font-size: 12px; color: var(--muted); margin-top: 8px;
  padding: 8px 12px; background: var(--bg); border-radius: 6px;
}
#modal .cite-row a { color: var(--teal); text-decoration: none; }
#modal pre {
  background: var(--bg); padding: 12px; border-radius: 6px;
  font-size: 12px; overflow-x: auto;
  font-family: ui-monospace, monospace;
}

/* ===== Clinical SOAP letterhead ===== */
.soap {
  background: white; padding: 0; font-family: -apple-system, "PingFang SC", sans-serif;
  line-height: 1.7; color: #1c1917;
}
.soap .letterhead {
  border-bottom: 2px solid var(--text); padding-bottom: 12px; margin-bottom: 16px;
}
.soap .letterhead h2 {
  margin: 0; font-size: 16px; letter-spacing: 0.04em; text-transform: uppercase;
}
.soap .letterhead .meta {
  font-size: 12px; color: var(--muted); margin-top: 6px;
  font-family: ui-monospace, monospace;
  display: grid; grid-template-columns: 1fr 1fr; gap: 2px 12px;
}
.soap .section-head {
  font-size: 13px; font-weight: 700; letter-spacing: 0.05em;
  text-transform: uppercase; margin: 18px 0 6px;
  border-bottom: 1px solid var(--border); padding-bottom: 4px;
}
.soap p { margin: 6px 0; font-size: 13.5px; }
.soap ul, .soap ol { margin: 6px 0; padding-left: 22px; }
.soap li { margin: 4px 0; font-size: 13.5px; }
.soap .objective-block {
  background: #f8fafc; padding: 10px 14px; border-radius: 4px;
  font-family: ui-monospace, monospace; font-size: 12.5px;
  border-left: 3px solid var(--teal); margin: 6px 0;
}
.soap .objective-block .ob-row {
  display: flex; gap: 8px; margin: 3px 0;
}
.soap .objective-block .ob-row .lbl { color: var(--muted); min-width: 180px; }
.soap .objective-block .ob-row .val { color: var(--text); }
.soap .objective-block .ob-row .interp { color: var(--orange); margin-left: 8px; }
.soap .icd { font-family: ui-monospace, monospace; background: #fef3c7; padding: 1px 6px; border-radius: 3px; font-size: 12px; }
.soap .signoff {
  border-top: 1px solid var(--border); margin-top: 18px;
  padding-top: 10px; font-size: 11px; color: var(--muted); font-style: italic;
}
.soap a { color: var(--teal); }
.soap .ref {
  font-size: 11px; color: var(--muted); margin-top: 2px;
  font-family: ui-monospace, monospace;
}

/* clickable hover */
.cad, .modal-block, .bpsd-cell { cursor: pointer; transition: transform 0.1s, box-shadow 0.1s; }
.cad:hover, .modal-block:hover, .bpsd-cell:hover {
  transform: translateY(-1px); box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

/* ===== Sensor Board ===== */
.sensor-board-head {
  display: flex; gap: 14px; align-items: center; flex-wrap: wrap;
  padding: 8px 12px; background: #0f172a; color: #e2e8f0;
  border-radius: 8px 8px 0 0; font-size: 12px;
  font-family: ui-monospace, monospace;
}
.sb-dot {
  display: inline-block; width: 8px; height: 8px; border-radius: 50%;
  margin-right: 6px; vertical-align: middle;
}
.sb-dot.live { background: #22c55e; box-shadow: 0 0 8px #22c55e; animation: pulse 1.4s ease-in-out infinite; }
.sb-dot.rec { background: #ef4444; animation: pulse 1s ease-in-out infinite; }
.sb-dot.off { background: #64748b; }
@keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: 0.4 } }
.sensor-board-head .sep { opacity: 0.3; }
.sensor-board-head .sr { color: #5eead4; }
.sensor-board-head .pid { color: #fbbf24; }

.channel-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  background: #0f172a;
  padding: 10px;
  border-radius: 0 0 8px 8px;
}
.ch-card {
  background: #1e293b;
  border-radius: 6px;
  padding: 10px 12px;
  border: 1px solid #334155;
  position: relative;
  overflow: hidden;
}
.ch-card .ch-name {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 11px; color: #94a3b8; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.04em;
}
.ch-card .ch-tag {
  font-size: 9px; padding: 1px 5px; border-radius: 3px;
  background: #334155; color: #cbd5e1;
}
.ch-card .ch-tag.alert { background: #7f1d1d; color: #fecaca; }
.ch-card .ch-val {
  font-size: 20px; font-weight: 700; color: #f1f5f9;
  font-family: ui-monospace, monospace;
  margin: 4px 0 2px;
}
.ch-card .ch-val small { font-size: 12px; color: #64748b; font-weight: 400; }
.ch-card .ch-wave {
  width: 100%; height: 36px; margin-top: 4px;
}
.ch-card .ch-wave path {
  fill: none; stroke-width: 1.5; stroke-linejoin: round; stroke-linecap: round;
}
.ch-eda  path { stroke: #f59e0b; }
.ch-ppg  path { stroke: #ef4444; }
.ch-hr   path { stroke: #ec4899; }
.ch-spo2 path { stroke: #06b6d4; }
.ch-imu  path { stroke: #8b5cf6; }
.ch-aud  path { stroke: #10b981; }
.ch-card.flag-alert { border-color: #ef4444; box-shadow: 0 0 0 1px #ef4444; }
.ch-card.flag-alert .ch-val { color: #fecaca; }
.ch-card.flag-warn { border-color: #f59e0b; }

@media (max-width: 1100px) { .channel-grid { grid-template-columns: repeat(2, 1fr); } }

/* alert banner */
.alert-banner {
  background: var(--red-bg);
  border: 1px solid var(--red);
  color: #7f1d1d;
  padding: 10px 16px;
  border-radius: 8px;
  margin-bottom: 14px;
  display: flex;
  gap: 10px;
  align-items: center;
  font-size: 13px;
}
.alert-banner.warn { background: var(--yellow-bg); border-color: var(--yellow); color: #713f12; }
.alert-banner.ok { background: var(--green-bg); border-color: var(--green); color: #14532d; }

@media (max-width: 900px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { border-right: 0; border-bottom: 1px solid var(--border); }
  .modal-grid { grid-template-columns: 1fr 1fr; }
  .cadence-grid { grid-template-columns: 1fr 1fr; }
  .bpsd-grid { grid-template-columns: repeat(4, 1fr); }
}
</style>
</head>
<body>

<nav class="brandbar">
  <a class="brandbar-logo" href="index.html" aria-label="I-THREAD">
    <img src="assets/i-thread-logo.svg" alt="I-THREAD" />
  </a>
  <span class="brandbar-divider"></span>
  <span class="brandbar-product" data-i18n="brand.glove"></span>
  <span class="brandbar-tag"     data-i18n="brand.tagline"></span>
  <div class="brandbar-pills">
    <a href="index.html"   data-i18n="nav.home"></a>
    <a href="patient.html" data-i18n="nav.patient"></a>
    <a href="doctor.html"  class="active" data-i18n="nav.doctor"></a>
    <a href="index.html"   data-i18n="nav.realtime" data-i18n-title="nav.realtime.tip"></a>
  </div>
  <button type="button" class="lang-toggle" data-lang-toggle aria-label="Switch language">中</button>
</nav>

<div class="layout">

  <!-- ===== 左侧：患者列表 ===== -->
  <aside class="sidebar">
    <h3 data-i18n="doctor.sidebar.h">患者列表 (4 案例)</h3>
    <input class="search" data-i18n-placeholder="doctor.sidebar.search" placeholder="🔍 搜索 ID / 姓名" />

    <div id="patientList"></div>

    <div style="margin-top:14px; padding:10px 12px; background:#faf5ff; border:1px dashed #c4b5fd; border-radius:8px;">
      <div style="font-size:11px;color:#6b21a8;font-weight:600;margin-bottom:6px" data-i18n="doctor.sidebar.upload">📤 上传你的 progression.csv</div>
      <input type="file" id="customCsv" accept=".csv" onchange="handleCustomUpload(event)" style="font-size:11px;width:100%">
      <div style="font-size:10px;color:var(--muted);margin-top:4px" data-i18n="doctor.sidebar.uploadHint">从 ad-synthetic-generator 或自己的纵向数据导入</div>
    </div>

    <div style="margin-top:14px; padding:10px 12px; background:var(--bg); border-radius:8px; font-size:11px; color:var(--muted)">
      <strong style="color:var(--text)" data-i18n="doctor.sidebar.sources">数据来源：</strong><br>
      🧠 MIND = <a href="https://github.com/Jewelina95/ad-mind-pipeline" target="_blank" style="color:var(--teal)">ad-mind-pipeline</a><br>
      📚 WIKI = <a href="https://jewelina95.github.io/ad-wiki-pages/" target="_blank" style="color:var(--teal)">ad-wiki-pages KB</a>
    </div>
  </aside>

  <!-- ===== 右侧：主面板 ===== -->
  <main class="main" id="mainPanel">
    <!-- 由 JS 渲染 -->
  </main>

</div>

<div id="toast"></div>

<!-- 详情 Modal -->
<div id="modal" onclick="if(event.target===this) closeModal()">
  <div class="panel">

const mindCache = {};
async function fetchJson(url) {
  try {
    const r = await fetch(url);
    if (!r.ok) return null;
    return await r.json();
  } catch (e) { return null; }
}
async function fetchJsonl(url) {
  try {
    const r = await fetch(url);
    if (!r.ok) return [];
    const txt = await r.text();
    return txt.trim().split('\n').filter(Boolean).map(l => JSON.parse(l));
  } catch (e) { return []; }
}
async function fetchMindPatient(id) {
  if (mindCache[id]) return mindCache[id];
  const [persona, dashboard, clinical, physio, behavior, bpsd, ema, notes] = await Promise.all([
    fetchJson(`${MIND_BASE}/${id}/persona.json`),
    fetchJson(`${MIND_BASE}/${id}/dashboard.json`),
    fetchJson(`${MIND_BASE}/${id}/insights_clinical.json`),
    fetchJson(`${MIND_BASE}/${id}/insights_physio.json`),
    fetchJson(`${MIND_BASE}/${id}/insights_behavior.json`),
    fetchJsonl(`${MIND_BASE}/${id}/bpsd_events.jsonl`),
    fetchJsonl(`${MIND_BASE}/${id}/ema.jsonl`),
    fetchJsonl(`${MIND_BASE}/${id}/notes.jsonl`)
  ]);
  // Pipeline 完整度：4 个 JSON 全有 = full；只有 persona = pipeline 未跑
  const complete = !!(dashboard && clinical && physio && behavior);
  mindCache[id] = { persona, dashboard, clinical, physio, behavior, bpsd, ema, notes, complete };
  return mindCache[id];
}

function kbToWiki(code) {
  // 提取前缀 (e.g. "MCR_CRITERIA_001" → "MCR_CRITERIA")
  const prefix = code.replace(/_\d+$/, "");
  const m = KB_TO_WIKI[prefix];
  if (!m) return { url: null, label: code };
  return { url: `${WIKI_BASE_URL}/${m.page}.md`, label: m.label, code };
}

function renderCurrentView(id, data) {
  if (!data.complete) {
    // Pipeline 未跑 — 仅渲染 raw 数据降级视图
    renderRawOnlyView(id, data);
    startSensorBoard('mci');
    return;

  if (currentMindView === 'wiki') {
    renderWikiView(id, data);

  }
  const alert = data.dashboard.alert_level;
  const profile = alert === 'red' ? 'alert' : alert === 'yellow' ? 'mci' : 'healthy';
  startSensorBoard(profile);

          <div class="cad ${cd.level}" onclick="openMindCadenceReport('${id}','${cd.k}')" style="text-align:left;padding:14px;border-width:2px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
              <span style="font-size:13px;font-weight:700;color:${frameworkColor}">${cd.ic} ${cd.label}</span>
              <span style="font-size:10px;background:${cd.level==='alert'?'#fee2e2':cd.level==='warn'?'#fef3c7':'#dcfce7'};color:${cd.level==='alert'?'#7f1d1d':cd.level==='warn'?'#713f12':'#14532d'};padding:1px 6px;border-radius:3px">${lvBadge(cd.level)}</span>
            </div>
            <div style="font-size:11px;color:var(--muted);line-height:1.5">${cd.summary}</div>
            <div style="font-size:10px;color:${frameworkColor};margin-top:8px;font-weight:600">${ctaTxt}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

// ===== SOAP 临床报告生成器（参考 ~/.claude/skills/clinical-report-soap） =====
function openMindCadenceReport(id, cadence) {
  const data = mindCache[id];
  if (!data) return;
  const meta = MIND_PATIENTS_META[id];
  const c = data.clinical;
  const ph = data.physio;
  const bh = data.behavior;
  const d = data.dashboard;
  const bpsd = data.bpsd || [];
  const ema = data.ema || [];
  const notes = data.notes || [];

  const evidenceCite = currentMindView === 'wiki' ? 'AD wiki KB' : 'Multi-Agent pipeline (PhysioAgent + BehaviorAgent + ClinicalAgent + Narrator)';
  const evidenceUrl = currentMindView === 'wiki' ? 'https://jewelina95.github.io/ad-wiki-pages/' : `https://github.com/Jewelina95/ad-mind-pipeline/tree/main/data_v2/${id}`;
  const titleMap = { '1h': 'Sensor Event Note (1h)', '7d': 'Interval Progress Note (7d)', '30d': 'Monthly Visit Note (30d)' };
  const today = new Date().toISOString().slice(0,10);
  const title = `${titleMap[cadence]} · ${id} · ${currentMindView==='wiki' ? '📚 WIKI 引用' : '🧠 MIND 引用'}`;
  let html = '';

  // 通用辅助
  const lastEma = ema.length ? ema[ema.length-1] : null;
  const lastDayBpsd = bpsd.filter(e => e.day >= meta.bpsd === 0 ? 28 : (bpsd.length ? bpsd[bpsd.length-1].day - 1 : 28));

  // ===== SOAP 临床报告 =====
  // 阶段 → ICD-10
  const stageToIcd = (s) => {
    if (!s) return { code:'R41.81', label:'Age-related cognitive decline' };
    if (s.includes('mci_to_mild') || s.includes('mild_ad')) return { code:'G30.9 + F02.80', label:'Alzheimer disease, unspecified, with dementia' };
    if (s.includes('mci'))      return { code:'G31.84', label:'Mild cognitive impairment' };
    if (s.includes('moderate')) return { code:'G30.1 + F02.81', label:'Late-onset AD with behavioral disturbance' };
    if (s.includes('severe'))   return { code:'G30.1 + F02.81', label:'Late-onset AD with behavioral disturbance' };
    return { code:'R41.81', label:'Age-related cognitive decline' };
  };
  const icd = stageToIcd(c.stage_inclination);

  // BPSD 文字化
  const bpsdNarrative = bpsd.length === 0 ? '本月监测期内未记录到明显 BPSD 事件。' :
    `本月监测期内共记录 ${bpsd.length} 次 BPSD 事件：` +
    bpsd.map(e => `D${e.day} ${e.type || '事件'} ${e.duration_min ? `(${e.duration_min} 分钟)` : ''}${e.context ? ' · ' + e.context : ''}`).join('；') + '。';

  // EMA 文字化
  const emaNarrative = ema.length === 0 ? '无患者自报情绪/睡眠 EMA。' :
    `EMA 共采集 ${ema.length} 次。最近一次：mood ${lastEma.mood ?? '-'}/10、anxiety ${lastEma.anxiety ?? '-'}/10、sleep ${lastEma.sleep ?? '-'}/10、energy ${lastEma.energy ?? '-'}/10。`;

  // 物理 metric → 临床短语 (从 ph.insights 提取)
  const objectiveRows = ph.insights.slice(0, 6).map(i => {
    const klinks = (i.supporting_knowledge || []).map(k => kbToWiki(k)).filter(w => w.url);
    const cite = currentMindView === 'wiki' && klinks.length
      ? klinks.slice(0,1).map(w => `<a href="${w.url}" target="_blank">${w.label}↗</a>`).join('')
      : `<a href="${evidenceUrl}" target="_blank">${i.id}↗</a>`;
    return `<div class="ob-row"><span class="lbl">${i.observation}</span><span class="interp">${i.clinical_implication}</span> <span class="ref">${cite}</span></div>`;
  }).join('');

  // Behavior insights → narrative HPI
  const hpiBehavior = bh.insights.slice(0, 4).map(i => `${i.observation}（${i.clinical_implication}）`).join('；');

  const letterhead = (type) => `
    <div class="letterhead">
      <h2>${type}</h2>
      <div class="meta">
        <span><strong>Patient</strong>: ${id}（脱敏）</span>
        <span><strong>Age / Sex</strong>: ${meta.age} / ${meta.sex === 'M' ? '男' : '女'}</span>
        <span><strong>Education</strong>: ${meta.edu} 年</span>
        <span><strong>Monitoring window</strong>: Day 0–${meta.bpsd === 0 ? '30' : '30'}</span>
        <span><strong>Date</strong>: ${today}</span>
        <span><strong>Provider</strong>: AD glove monitoring (auto-generated)</span>
        <span><strong>Evidence basis</strong>: ${evidenceCite}</span>
        <span><strong>Source</strong>: <a href="${evidenceUrl}" target="_blank">${evidenceUrl.replace('https://','')}</a></span>
      </div>
    </div>
  `;

  const signoff = `
    <div class="signoff">
      This report is auto-generated from continuous wearable monitoring (multimodal IMU/PPG/EDA/voice) and
      integrates the patient's longitudinal sensor trajectory with clinical decision rules. It does not
      replace gold-standard biomarker confirmation (plasma p-tau217 / CSF / amyloid PET) and requires
      physician review and electronic signature before any clinical decision is acted on.
    </div>
  `;

  if (cadence === '30d') {
    // ===== Monthly Visit Note (full SOAP) =====
    html = `
    <div class="soap">
      ${letterhead('NEUROLOGY / GERIATRIC PROGRESS NOTE — MONTHLY')}

      <div class="section-head">S — Subjective</div>
      <p>${meta.age} 岁${meta.sex === 'M' ? '男' : '女'}性，受教育 ${meta.edu} 年。本次为佩戴智能手套监测系统的 ${meta.n_days || 30} 天阶段性评估。</p>
      <p>${d.medical_history}</p>
      <p>本期临床 Notes：${d.session_recap}</p>
      <p>${bpsdNarrative}</p>
      <p>${hpiBehavior || '行为情绪域无明显异常。'}</p>
      <p>${emaNarrative}</p>

      <div class="section-head">O — Objective</div>
      <p>Wearable-derived metrics over the ${meta.n_days || 30}-day monitoring window:</p>
      <div class="objective-block">${objectiveRows || '<div class="ob-row">No structured PhysioAgent insights returned.</div>'}</div>
      <p style="margin-top:10px">Caregiver-reported BPSD events: ${bpsd.length === 0 ? '无' : bpsd.map(e => `${e.type || '事件'} D${e.day}`).join('、')}.</p>
      <p>Patient-reported EMA: ${lastEma ? `mood ${lastEma.mood}/10, anxiety ${lastEma.anxiety}/10, sleep ${lastEma.sleep}/10, energy ${lastEma.energy}/10` : '无'}.</p>
      <p>Sensor-derived MMSE estimate (cognitive composite): refer to Narrator dashboard for current value vs Day 0 baseline.</p>

      <div class="section-head">A — Assessment</div>
      <p><strong>Working diagnosis:</strong> ${icd.label} <span class="icd">ICD-10: ${icd.code}</span> · stage tendency: <code>${c.stage_inclination}</code> · clinician confidence ${(c.stage_confidence*100).toFixed(0)}%.</p>
      <p><strong>Differential diagnoses to consider:</strong></p>
      <ol>${(c.differential_concern || d.differential_concern || []).map(x => `<li>${x}</li>`).join('')}</ol>

      <div class="section-head">P — Plan</div>
      <p><strong>1. Diagnostic workup</strong></p>
      <ul>
        ${c.gold_standard_referral === 'yes' ? `
        <li>Plasma p-tau217 (Quanterix or equivalent) — required to confirm AD pathology before initiating anti-amyloid therapy.</li>
        <li>Brain MRI (T1, T2-FLAIR, SWI) — evaluate vascular load and hippocampal atrophy; rule out NPH, mass.</li>
        <li>Amyloid PET if biomarker-positive and patient is candidate for lecanemab / donanemab.</li>
        ` : `
        <li>Continue clinical monitoring; biomarker workup deferred at this time.</li>
        `}
        <li>Formal neuropsychological testing to characterize domain-specific deficits.</li>
        <li>Routine labs to exclude reversible causes: B12, folate, TSH, CMP, RPR.</li>
      </ul>
      <p><strong>2. Pharmacologic</strong></p>
      <ul>
        ${c.stage_inclination?.includes('mild') || c.stage_inclination?.includes('mci_to_mild') ? '<li>Hold cholinesterase inhibitor pending biomarker confirmation. If confirmed AD: donepezil 5 mg PO daily, titrate to 10 mg in 4 weeks.</li>' : ''}
        ${(bh.insights || []).some(i => (i.supporting_knowledge || []).some(k => k.startsWith('BPSD_DEPRESSION'))) ? '<li>Depressive symptoms warrant trial of SSRI: sertraline 25 mg PO daily, titrate. Reassess in 4–6 weeks.</li>' : ''}
        <li>Avoid anticholinergics, long-acting benzodiazepines, antihistamines.</li>
      </ul>
      <p><strong>3. Non-pharmacologic</strong></p>
      <ul>
        ${(c.intervention_priority || []).map(iv => `<li><strong>${iv.type}</strong> (${iv.urgency}): ${iv.rationale}.</li>`).join('') || '<li>Continue music therapy, cognitive training, sleep hygiene as previously prescribed.</li>'}
      </ul>
      <p><strong>4. Caregiver / safety</strong></p>
      <ul>
        ${bpsd.some(e => e.type && e.type.includes('wander')) ? '<li><strong>Wandering risk active</strong>. Activate glove GPS tracking. Provide caregiver with written wandering response protocol. Consider ID bracelet.</li>' : ''}
        <li>Caregiver burden assessment (Zarit Burden Interview) at next visit.</li>
        <li>Review medication management (pill organizer, daily reminder).</li>
        <li>Driving evaluation if not already documented.</li>
        <li>Discuss advance directives, power of attorney with family.</li>
      </ul>
      <p><strong>5. Follow-up</strong></p>
      <ul>
        <li>Reassess in 4 weeks with continued wearable monitoring.</li>
        <li>Sooner contact if: new safety event (fall, getting lost), new BPSD episode > 30 min, or caregiver crisis.</li>
        <li>Continued data review at next visit; sensor metrics will reflect treatment response or progression.</li>
      </ul>

      ${signoff}
    </div>
    `;
  } else if (cadence === '7d') {
    // ===== Weekly Interval Progress Note =====
    const weekBpsd = bpsd.slice(-3);
    const weekInsights = bh.insights.slice(0, 3);
    html = `
    <div class="soap">
      ${letterhead('INTERVAL PROGRESS NOTE — WEEKLY')}

      <div class="section-head">S — Subjective (this week)</div>
      <p>${weekBpsd.length > 0
        ? `Caregiver reports ${weekBpsd.length} BPSD episode${weekBpsd.length > 1 ? 's' : ''} this week: ` + weekBpsd.map(e => `${e.type || '事件'} D${e.day} (${e.duration_min || '?'} 分钟)`).join(', ') + '.'
        : 'Caregiver reports no acute BPSD episodes this week.'}</p>
      <p>${lastEma ? `Patient-reported EMA latest: mood ${lastEma.mood}/10, anxiety ${lastEma.anxiety}/10, sleep ${lastEma.sleep}/10.` : '无 EMA。'}</p>

      <div class="section-head">O — Objective (interval change)</div>
      <p>Wearable trends across this 7-day interval:</p>
      <div class="objective-block">
        ${weekInsights.map(i => `<div class="ob-row"><span class="lbl">${i.observation}</span><span class="interp">${i.clinical_implication}</span></div>`).join('') || '<div class="ob-row">No new behavioral insights this week.</div>'}
      </div>

      <div class="section-head">A — Assessment</div>
      <p>Patient remains on stable trajectory of ${c.stage_inclination} (confidence ${(c.stage_confidence*100).toFixed(0)}%). ${weekBpsd.length > 1 ? '<strong>BPSD frequency this week exceeds typical baseline; consider escalating non-pharmacologic intervention.</strong>' : 'No new differential concern this week.'}</p>

      <div class="section-head">P — Plan changes</div>
      <ul>
        <li>Continue current treatment plan as documented in the most recent monthly visit note.</li>
        ${weekBpsd.length > 1 ? '<li>Escalate music therapy frequency from once daily to twice daily.</li>' : ''}
        ${lastEma && lastEma.mood < 4 ? '<li>Mood persistently low; consider initiating SSRI or escalating dose at next visit.</li>' : ''}
        ${lastEma && lastEma.sleep < 5 ? '<li>Reinforce sleep hygiene with caregiver. Document sleep diary for one week.</li>' : ''}
        <li>Next routine review: end of next week. Sooner if new safety event.</li>
      </ul>

      ${signoff}
    </div>
    `;
  } else if (cadence === '1h') {
    // ===== Hourly Sensor Event Note =====
    const recentBpsd = bpsd[bpsd.length - 1];
    html = `
    <div class="soap">
      ${letterhead('SENSOR EVENT NOTE — HOURLY')}

      <div class="section-head">Trigger</div>
      <p>${recentBpsd
        ? `Most recent recorded event: <strong>${recentBpsd.type || '事件'}</strong> on D${recentBpsd.day}, duration ${recentBpsd.duration_min || '?'} min. ${recentBpsd.context || recentBpsd.trigger ? 'Context: ' + (recentBpsd.context || recentBpsd.trigger) + '.' : ''}`
        : 'No acute event firing in the current hour. Routine monitoring active.'
      }</p>

      <div class="section-head">Real-time wearable signals (latest hour)</div>
      <div class="objective-block">
        <div class="ob-row"><span class="lbl">EDA tonic level</span><span class="val">streaming · see realtime board</span></div>
        <div class="ob-row"><span class="lbl">Heart rate</span><span class="val">streaming · see realtime board</span></div>
        <div class="ob-row"><span class="lbl">IMU activity</span><span class="val">streaming · see realtime board</span></div>
        <div class="ob-row"><span class="lbl">Audio (speech) presence</span><span class="val">streaming · see realtime board</span></div>
      </div>

      <div class="section-head">EMA (most recent)</div>
      <p>${lastEma ? `mood ${lastEma.mood}/10, anxiety ${lastEma.anxiety}/10, sleep ${lastEma.sleep}/10, energy ${lastEma.energy}/10.` : 'No EMA submission in current hour.'}</p>

      <div class="section-head">Action taken</div>
      <ul>
        ${recentBpsd && recentBpsd.type && recentBpsd.type.includes('agitat') ? '<li>Triggered music therapy via glove speaker (patient-preferred era).</li><li>Caregiver alerted via app push.</li>' : ''}
        ${recentBpsd && recentBpsd.type && recentBpsd.type.includes('wander') ? '<li>GPS tracking activated. Caregiver alerted with current location.</li>' : ''}
        ${!recentBpsd ? '<li>No intervention required. Continue routine monitoring.</li>' : ''}
      </ul>

      <div class="section-head">Recheck</div>
      <p>Re-evaluate at next hourly cycle. Escalate to weekly review if EDA / HR / mood remain abnormal at recheck.</p>

      ${signoff}
    </div>
    `;
  }

  openModal(title, html);
}

// ===== WIKI 视角 (同一份 fetch 数据，按 wiki KB 框架重组) =====
function renderWikiView(id, data) {
  const meta = MIND_PATIENTS_META[id];
  const d = data.dashboard;
  const c = data.clinical;
  const ph = data.physio;
  const bh = data.behavior;

  // 按 wiki 框架: Unified Clinical Agent 推理链
  // 把 physio + behavior insights 合并成 reasoning chain，每条挂 wiki 链接
  const allInsights = [...ph.insights, ...bh.insights];

  const en = isEN();
  // 由 supporting_knowledge 推断 wiki 引用
  const reasoningHtml = allInsights.map((ins, i) => {
    const kbLinks = (ins.supporting_knowledge || []).map(code => {
      const w = kbToWiki(code);
      return w.url ? `<a href="${w.url}" target="_blank">${w.label}</a>` : `<span>${w.label}</span>`;
    }).join('');
    const isWarn = ins.confidence >= 0.8;
    return `
      <div class="reason-step ${isWarn ? 'warn' : ''}">
        <span class="num">${i+1}</span>
        <span class="title">${ins.observation}</span>
        <div class="body">
          <strong>${en ? 'Clinical implication:' : '临床含义：'}</strong>${ins.clinical_implication}
          ${ins.differential ? `<br><strong style="color:var(--muted)">${en ? 'Differential:' : '鉴别：'}</strong><span style="color:var(--muted)">${ins.differential}</span>` : ''}
        </div>
        <div class="cite">
          <a href="#" onclick="event.preventDefault();alert('Confidence: ${ins.confidence}\\nDomain: ${ins.domain}\\nID: ${ins.id}')">conf ${(ins.confidence*100).toFixed(0)}%</a>
          ${kbLinks}
        </div>
      </div>
    `;
  }).join('');

  // 把数字按 wiki concept 分组（HRV / 步态 / EDA / 语音 / BPSD）
  const physioByDomain = {
    "gait": ph.insights.filter(i => i.supporting_knowledge.some(k => k.startsWith('SENSOR_IMU') || k.startsWith('NORM_GAIT') || k.startsWith('MCR'))),
    "HRV":  ph.insights.filter(i => i.supporting_knowledge.some(k => k.startsWith('SENSOR_PPG'))),
    "EDA":  ph.insights.filter(i => i.supporting_knowledge.some(k => k.startsWith('SENSOR_EDA'))),
  };
  const domainLabel = (dom) => dom === 'gait' ? (en ? 'Gait' : '步态') : dom;
  const physioGridHtml = Object.entries(physioByDomain).filter(([_,arr]) => arr.length).map(([dom, arr]) => `
    <div class="modal-block" style="cursor:default">
      <h4>${dom==='gait'?'🚶':dom==='HRV'?'❤️':'💧'} ${domainLabel(dom)}</h4>
      ${arr.map(i => `<div style="font-size:12px;padding:4px 0;border-bottom:1px dashed var(--border)">
        ${i.observation}
      </div>`).join('')}
      <div class="src">📚 <a href="${WIKI_BASE_URL}/${dom==='HRV'?'ppg_hrv':dom==='EDA'?'eda_signal':'imu_gait'}.md" target="_blank">wiki/concepts/${dom==='HRV'?'ppg_hrv':dom==='EDA'?'eda_signal':'imu_gait'}.md ↗</a></div>
    </div>
  `).join('');

  // BPSD 7 grid — keyed by canonical name, label localised
  const BPSD_KEYS = ['agitation','anxiety','apathy','depression','sleep','sundowning','wandering'];
  const bpsdMap = {agitation:'ok', anxiety:'ok', apathy:'ok', depression:'ok', sleep:'ok', sundowning:'ok', wandering:'ok'};
  bh.insights.forEach(i => {
    i.supporting_knowledge.forEach(k => {
      if (k.startsWith('BPSD_AGITATION'))  bpsdMap.agitation = 'bad';
      if (k.startsWith('BPSD_ANXIETY'))    bpsdMap.anxiety = 'warn';
      if (k.startsWith('BPSD_DEPRESSION')) bpsdMap.depression = 'warn';
      if (k.startsWith('BPSD_APATHY'))     bpsdMap.apathy = 'warn';
      if (k.startsWith('BPSD_SLEEP'))      bpsdMap.sleep = 'warn';
      if (k.startsWith('BPSD_SUNDOWNING')) bpsdMap.sundowning = 'warn';
      if (k.startsWith('BPSD_WANDERING'))  bpsdMap.wandering = 'bad';
    });

  const bpsdLevelLabel = (lv) => lv==='ok' ? (en ? 'normal' : '正常') : lv==='warn' ? (en ? 'watch' : '关注') : (en ? 'high risk' : '高风险');
  const bpsdHtml = BPSD_KEYS.map(k => `
    <div class="bpsd-cell lv-${bpsdMap[k]}" style="cursor:default">
      <div class="nm">${t('bpsd.' + k)}</div>

  // 阶段映射

        <div class="pmeta">${pmetaW}</div>
      </div>
      <div class="stat">
        <div class="v">${ph.insights.length + bh.insights.length}</div>
        <div class="l">${en ? 'Reasoning steps' : '推理条'}</div>
      </div>
      <div class="stat">
        <div class="v">${ph.kb_entries_used + bh.kb_entries_used}</div>
        <div class="l">${en ? 'KB entries cited' : 'KB 条目引用'}</div>
      </div>
      <div class="stat">
        <div class="v">${(c.stage_confidence*100).toFixed(0)}%</div>
        <div class="l">${en ? 'Overall confidence' : '综合置信度'}</div>
      </div>
    </div>

    <div class="alert-banner ${d.alert_level==='red'?'':'warn'}">
      📚 ${en
        ? 'Reading the same raw data (physio + behavior insights) through the ad-wiki-pages framework — different clinical knowledge organisation.'
        : '按 ad-wiki-pages 框架解读 · 同一份原始数据 (physio + behavior insights) · 不同的临床知识体系'}

    ${renderCadenceRow(id, data)}

    <div class="section">

        <span class="badge" style="background:var(--orange-bg);color:var(--orange);margin-left:auto">${stage} · ${(c.stage_confidence*100).toFixed(0)}%</span>

    <div class="section">

async function openMindReportModal(id) {
  openModal(`📄 ${id} · report.md`, '<div style="padding:30px;text-align:center;color:var(--muted)">⏳ 加载中…</div>');
  try {
    const r = await fetch(`${MIND_BASE}/${id}/report.md`);
    const md = await r.text();
    const html = md
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/^# (.+)$/gm, '<h2>$1</h2>')
      .replace(/^## (.+)$/gm, '<h3>$1</h3>')
      .replace(/^### (.+)$/gm, '<h4>$1</h4>')
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\n\n/g, '</p><p>')
      .replace(/\n/g, '<br>');
    document.getElementById('modalBody').innerHTML = `<p>${html}</p>
      <div class="cite-row">📂 <a href="https://github.com/Jewelina95/ad-mind-pipeline/blob/main/data_v2/${id}/report.md" target="_blank">GitHub 原文 ↗</a></div>`;
  } catch (e) {
    document.getElementById('modalBody').innerHTML = `<div style="color:var(--red)">加载失败：${e.message}</div>`;
  }
}

// ===== 上传 progression.csv =====
function handleCustomUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const text = ev.target.result;
      const lines = text.trim().split(/\r?\n/);
      if (lines.length < 2) throw new Error("CSV 至少 1 行表头 + 1 行数据");
      const header = lines[0].split(',').map(x => x.trim());
      const rows = lines.slice(1).map(l => {
        const cells = l.split(',').map(x => x.trim());
        const obj = {};
        header.forEach((h, i) => obj[h] = cells[i]);
        return obj;
      });
      customPatient = { name: file.name, header, rows };
      renderCustomPatient();
      document.querySelectorAll('.patient-card').forEach(el => el.classList.remove('active'));
    } catch (err) {
      alert('CSV 解析失败：' + err.message);
    }
  };
  reader.readAsText(file);
}

  const rows = cp.rows;
  function pickCol(names) { for (const n of names) if (n in rows[0]) return n; return null; }
  const colGait = pickCol(['gait_speed','gait_speed_normal','step_speed','speed']);
  const colMmse = pickCol(['mmse','mmse_score','MMSE']);
  const colMood = pickCol(['mood','ema_mood','mood_score']);
  const colHrv  = pickCol(['hrv_sdnn','hrv','sdnn','SDNN']);
  const last = rows[rows.length - 1], first = rows[0];
  const today = new Date().toISOString().slice(0,10);
  let title, html;

  // 根据末日推断分期
  let stage = 'unspecified', icd = { code: 'R41.81', label: 'Age-related cognitive decline' };
  if (colGait) {
    const g = parseFloat(last[colGait]);
    if (g < 0.8) { stage = 'mild AD'; icd = { code: 'G30.9', label: 'AD unspecified' }; }
    else if (g < 1.0) { stage = 'MCI'; icd = { code: 'G31.84', label: 'Mild cognitive impairment' }; }
  }
  if (colMmse) {
    const m = parseFloat(last[colMmse]);
    if (m < 18) { stage = 'moderate AD'; icd = { code: 'G30.1 + F02.81', label: 'Late-onset AD with behavioral disturbance' }; }
    else if (m < 24) { stage = 'mild AD'; icd = { code: 'G30.9', label: 'AD unspecified' }; }
    else if (m < 27) { stage = 'MCI'; icd = { code: 'G31.84', label: 'Mild cognitive impairment' }; }
  }

  const lhead = (type) => `
    <div class="letterhead">
      <h2>${type}</h2>
      <div class="meta">
        <span><strong>Source</strong>: uploaded CSV — <code>${cp.name}</code></span>
        <span><strong>Records</strong>: ${rows.length} rows · ${cp.header.length} cols</span>
        <span><strong>Date</strong>: ${today}</span>
        <span><strong>Provider</strong>: AD glove monitoring (auto-generated)</span>
      </div>
    </div>
  `;
  const sign = `
    <div class="signoff">
      Auto-generated from uploaded longitudinal CSV. Requires physician review and electronic signature.
      Recommend running this CSV through <a href="https://github.com/Jewelina95/ad-mind-pipeline" target="_blank">ad-mind-pipeline</a> for full Multi-Agent inference.
    </div>
  `;

  if (cadence === '1h') {
    title = `Sensor Event Note · ${cp.name}`;
    const findings = [];
    if (colGait) {
      const g = parseFloat(last[colGait]);
      findings.push(`<div class="ob-row"><span class="lbl">Gait speed</span><span class="val">${g.toFixed(2)} m/s</span><span class="interp">${g < 1.0 ? 'below MCR threshold (Verghese 2014)' : 'within reference'}</span></div>`);
    }
    if (colMood) findings.push(`<div class="ob-row"><span class="lbl">EMA mood</span><span class="val">${last[colMood]}/10</span><span class="interp">${parseFloat(last[colMood]) < 4 ? 'below depression screening cutoff' : 'within reference'}</span></div>`);
    if (colHrv) findings.push(`<div class="ob-row"><span class="lbl">HRV SDNN</span><span class="val">${last[colHrv]} ms</span><span class="interp">${parseFloat(last[colHrv]) < 35 ? 'reduced autonomic variability' : 'within reference'}</span></div>`);
    html = `
    <div class="soap">
      ${lhead('SENSOR EVENT NOTE — HOURLY (uploaded CSV)')}
      <div class="section-head">Trigger</div>
      <p>Most recent row of uploaded longitudinal record (record ${rows.length} of ${rows.length}).</p>
      <div class="section-head">Real-time wearable signals</div>
      <div class="objective-block">${findings.join('') || '<div class="ob-row">No recognized columns (expected gait_speed, mmse, mood, hrv_sdnn).</div>'}</div>
      <div class="section-head">Action</div>
      <ul>
        <li>Continue routine monitoring; no acute event firing.</li>
        <li>Recheck at next hourly cycle.</li>
      </ul>
      ${sign}
    </div>
    `;
  } else if (cadence === '7d') {
    title = `Interval Progress Note · ${cp.name}`;
    const week = rows.slice(-7);
    const trend = (col) => {
      if (!col || week.length < 2) return null;
      const a = parseFloat(week[0][col]), b = parseFloat(week[week.length-1][col]);
      if (isNaN(a) || isNaN(b)) return null;
      return { col, a, b, delta: b-a, dpct: a ? ((b-a)/Math.abs(a)*100).toFixed(1) : 'n/a' };
    };
    const trends = [colGait,colMmse,colMood,colHrv].map(trend).filter(Boolean);
    const concerning = trends.filter(t => Math.abs(t.delta) > Math.abs(t.a) * 0.05);
    html = `
    <div class="soap">
      ${lhead('INTERVAL PROGRESS NOTE — WEEKLY (uploaded CSV)')}
      <div class="section-head">S — Subjective</div>
      <p>Patient is on continuous wearable monitoring (uploaded longitudinal CSV). Reporting interval covers the last 7 records of the uploaded series.</p>

      <div class="section-head">O — Objective (week-over-week change)</div>
      <div class="objective-block">
        ${trends.length ? trends.map(t => `<div class="ob-row"><span class="lbl">${t.col}</span><span class="val">${t.a.toFixed(2)} → ${t.b.toFixed(2)} (${t.delta>=0?'+':''}${t.dpct}%)</span><span class="interp">${Math.abs(t.delta)>Math.abs(t.a)*0.1 ? 'significant weekly change' : Math.abs(t.delta)>Math.abs(t.a)*0.05 ? 'modest change' : 'stable'}</span></div>`).join('') : '<div class="ob-row">No recognized longitudinal columns.</div>'}
      </div>

      <div class="section-head">A — Assessment</div>
      <p>${concerning.length === 0 ? 'Patient remains stable across all monitored domains this week.' : `${concerning.length} metric${concerning.length>1?'s':''} (${concerning.map(t=>t.col).join(', ')}) showed > 5% weekly change. Pending physician review for clinical significance.`}</p>

      <div class="section-head">P — Plan changes</div>
      <ul>
        <li>Continue current treatment as documented in most recent monthly visit note.</li>
        ${concerning.length > 1 ? '<li>Multiple metrics shifting; consider escalating non-pharmacologic interventions or earlier follow-up.</li>' : ''}
        <li>Next routine review: end of next week.</li>
      </ul>
      ${sign}
    </div>
    `;
  } else if (cadence === '30d') {
    title = `Monthly Visit Note · ${cp.name}`;
    const trend = (col) => {
      if (!col) return null;
      const a = parseFloat(first[col]), b = parseFloat(last[col]);
      if (isNaN(a) || isNaN(b)) return null;
      return { col, a, b, delta: b-a, dpct: a ? ((b-a)/Math.abs(a)*100).toFixed(1) : 'n/a' };
    };
    const trends = [colGait,colMmse,colMood,colHrv].map(trend).filter(Boolean);
    html = `
    <div class="soap">
      ${lhead('NEUROLOGY / GERIATRIC PROGRESS NOTE — MONTHLY (uploaded CSV)')}

      <div class="section-head">S — Subjective</div>
      <p>Patient enrolled in continuous wearable monitoring program with longitudinal record of ${rows.length} time points uploaded.</p>
      <p>No subjective caregiver narrative available from CSV alone — recommend pairing this report with caregiver interview at next visit.</p>

      <div class="section-head">O — Objective (full monitoring window)</div>
      <div class="objective-block">
        ${trends.length ? trends.map(t => {
          let thr = '';
          if (t.col === colGait) thr = `<a href="${WIKI_BASE_URL}/imu_gait.md" target="_blank">imu_gait↗</a>`;
          else if (t.col === colMmse) thr = `<a href="${WIKI_BASE_URL}/ad_staging.md" target="_blank">ad_staging↗</a>`;
          else if (t.col === colMood) thr = `<a href="${WIKI_BASE_URL}/bpsd_depression.md" target="_blank">bpsd_depression↗</a>`;
          else if (t.col === colHrv) thr = `<a href="${WIKI_BASE_URL}/ppg_hrv.md" target="_blank">ppg_hrv↗</a>`;
          return `<div class="ob-row"><span class="lbl">${t.col}</span><span class="val">${t.a.toFixed(2)} → ${t.b.toFixed(2)} (${t.delta>=0?'+':''}${t.dpct}%)</span><span class="ref">${thr}</span></div>`;
        }).join('') : '<div class="ob-row">No recognized longitudinal columns.</div>'}
      </div>

      <div class="section-head">A — Assessment</div>
      <p><strong>Working diagnosis:</strong> ${icd.label} <span class="icd">ICD-10: ${icd.code}</span> · suspected stage: <strong>${stage}</strong></p>
      <p>Differential to consider: AD vs Lewy body dementia (clarify with REM sleep history, hallucinations); AD vs vascular dementia (assess cerebrovascular risk and brain MRI); primary depression vs AD-comorbid depression.</p>

      <div class="section-head">P — Plan</div>
      <p><strong>1. Diagnostic workup</strong></p>
      <ul>
        <li>Plasma p-tau217 to confirm AD pathology (<a href="${WIKI_BASE_URL}/atn_framework.md" target="_blank">AT(N) framework ↗</a>).</li>
        <li>Brain MRI (T1, T2-FLAIR, SWI) to evaluate vascular load and hippocampal atrophy.</li>
        <li>Formal neuropsychological testing.</li>
      </ul>
      <p><strong>2. Pharmacologic / Non-pharmacologic</strong></p>
      <ul>
        <li>If AD confirmed: cholinesterase inhibitor (donepezil 5 mg, titrate).</li>
        <li>Music therapy, cognitive training, sleep hygiene.</li>
      </ul>
      <p><strong>3. Caregiver / safety</strong></p>
      <ul>
        <li>Caregiver burden assessment.</li>
        <li>Safety review (driving, medication management).</li>
      </ul>
      <p><strong>4. Follow-up</strong></p>
      <ul>
        <li>Reassess in 4 weeks with continued wearable monitoring.</li>
        <li>Recommended next step: run uploaded CSV through <a href="https://github.com/Jewelina95/ad-mind-pipeline" target="_blank">ad-mind-pipeline ↗</a> to generate full Multi-Agent insights for next visit.</li>
      </ul>

      ${sign}
    </div>
    `;
  }
  openModal(title, html);
}

// ===== Sensor Board 动画 =====
const BUF_LEN = 80;     // 80 个采样点的滚动 buffer
const TICK_MS = 100;    // 100ms 一帧
let sensorBuffers = {};
let sensorTimer = null;
let sensorPhase = 0;

function getChFlagClass(profile, chId) {
  const p = SENSOR_PROFILES[profile] && SENSOR_PROFILES[profile][chId];
  if (!p || !p.flag) return '';
  return p.flag === 'alert' ? 'flag-alert' : 'flag-warn';
}

function startSensorBoard(profileName) {
  const profile = SENSOR_PROFILES[profileName];
  if (!profile) return;
  // 初始化 buffer
  sensorBuffers = {};
  CHANNELS.forEach(c => { sensorBuffers[c.id] = new Array(BUF_LEN).fill(profile[c.id].base); });
  if (sensorTimer) clearInterval(sensorTimer);
  sensorPhase = 0;

  sensorTimer = setInterval(() => {
    sensorPhase += 1;
    const t = sensorPhase * TICK_MS / 1000; // 秒
    CHANNELS.forEach(c => {
      const cfg = profile[c.id];
      let v;
      if (c.id === "PPG-IR") {
        // PPG 振荡 = sin(2π·HR/60·t) + 噪声
        const hr = cfg.hr || 70;
        v = Math.sin(2 * Math.PI * (hr/60) * t) * 0.7 + (Math.random()-0.5) * cfg.noise;
      } else if (c.id === "IMU-AX" || c.id === "IMU-AY") {
        // 步态周期 ~1Hz
        v = cfg.base + Math.sin(2 * Math.PI * 1.0 * t + (c.id==="IMU-AY"?Math.PI/2:0)) * 0.3
            + (Math.random()-0.5) * cfg.noise;
      } else if (c.id === "IMU-AZ") {
        v = cfg.base + Math.sin(2 * Math.PI * 1.0 * t) * 0.15 + (Math.random()-0.5) * cfg.noise;
      } else if (c.id === "EDA") {
        // 慢漂移 + SCR 偶发尖峰
        const drift = Math.sin(2 * Math.PI * 0.05 * t) * 0.4;
        const scr = (profileName === 'alert' && Math.random() < 0.05) ? 2.5 : 0;
        v = cfg.base + drift + scr + (Math.random()-0.5) * cfg.noise;
      } else if (c.id === "AUDIO") {
        // 语音活动模拟（间歇性突起）
        const speech = Math.random() < (profileName==='healthy'?0.35:0.15) ? 25 : 0;
        v = cfg.base + speech + (Math.random()-0.5) * cfg.noise;
      } else {
        // HR / SpO2 慢变
        v = cfg.base + Math.sin(2 * Math.PI * 0.1 * t) * cfg.noise * 0.5
            + (Math.random()-0.5) * cfg.noise;
      }
      sensorBuffers[c.id].push(v);
      sensorBuffers[c.id].shift();

      // 更新数值显示
      const valEl = document.getElementById('val-' + c.id);
      if (valEl) {
        const fmt = c.id === "PPG-IR" ? v.toFixed(2)
                  : c.id === "HR" || c.id === "AUDIO" ? Math.round(v)
                  : c.id === "SpO2" ? v.toFixed(1)
                  : v.toFixed(2);
        valEl.innerHTML = `${fmt} <small>${c.unit}</small>`;
      }

      // 更新波形 path
      const pathEl = document.getElementById('wave-' + c.id);
      if (pathEl) {
        const buf = sensorBuffers[c.id];
        const lo = c.bandMin, hi = c.bandMax;
        const w = 240, h = 36;
        const d = buf.map((val, i) => {
          const x = (i / (buf.length - 1)) * w;
          const y = h - ((val - lo) / (hi - lo)) * h;
          const yc = Math.max(1, Math.min(h-1, y));
          return `${i===0?'M':'L'}${x.toFixed(1)},${yc.toFixed(1)}`;
        }).join(' ');
        pathEl.setAttribute('d', d);
      }
    });

    // 更新时钟
    const clk = document.getElementById('sbClock');
    if (clk) clk.textContent = new Date().toTimeString().slice(0,8);
  }, TICK_MS);
}

        <li>${en ? 'Sudden worsening confusion / aggressive behaviour' : '突然加重的混乱 / 攻击行为'}</li>
        <li>${en ? 'Hardly sleeping or eating for 2+ days in a row' : '连续 2 天以上几乎不睡 / 不吃'}</li>
        <li>${en ? 'Falls, disorientation, getting lost' : '跌倒、失去方向感、走失'}</li>
      </ul>
      <div class="cite-row">${en ? 'Auto-generated by the smart glove · for daily reference only · does not replace a clinical diagnosis' : '这份报告由智能手套自动生成 · 仅供日常参考 · 不替代医生诊断'}</div>
    `;
  } else if (kind === 'goldstandard') {
    title = en ? `🩺 Gold-standard workup recommendation · ${pname}` : `🩺 金标准检查推荐 · ${pname}`;
    html = en ? `
      <h3>Why we recommend the gold standard</h3>
      <p>The multimodal indicators already place this patient at <strong>${p.stage}</strong> (confidence ${(p.confidence*100).toFixed(0)}%), but the glove system makes a <strong>clinical inference</strong>, not a biological confirmation. The lecanemab / donanemab treatment window is only effective for MCI / mild AD and requires amyloid-positive confirmation.</p>
      <h3>Recommended workup (in priority order)</h3>
      <table>
        <tr><th>Test</th><th>Cost</th><th>Invasiveness</th><th>Diagnostic value</th></tr>
        <tr><td>Plasma p-tau217</td><td>~¥1,500</td><td>blood draw</td><td>PPV for amyloid+ ~85%</td></tr>
        <tr><td>Amyloid PET</td><td>~¥6,000–10,000</td><td>IV tracer</td><td>gold standard</td></tr>
        <tr><td>CSF Aβ42/40 + p-tau</td><td>~¥3,000</td><td>LP</td><td>gold standard</td></tr>
        <tr><td>Hippocampal MRI</td><td>~¥1,200</td><td>none</td><td>supportive</td></tr>
      </table>
      <h3>How to refer</h3>
      <ul>
        <li>Export this patient's 30-day longitudinal data → PDF report (using the weekly-report template)</li>
        <li>Refer to neurology / memory clinic</li>
        <li>Bring: glove report + prior MMSE/MoCA records + medication list</li>
      </ul>
      <div class="cite-row">📚 <a href="https://jewelina95.github.io/ad-wiki-pages/wiki/concepts/atn_framework.md" target="_blank">AT(N) framework ↗</a> · Jack 2024 revised criteria</div>
    ` : `
      <h3>为什么推荐做金标准</h3>
      <p>本患者综合多模态指标已达到 <strong>${p.stage}</strong>（置信度 ${(p.confidence*100).toFixed(0)}%），但手套系统是<strong>临床推断</strong>，不能替代生物学确诊。Lecanemab / Donanemab 治疗窗口仅对 MCI / 轻度 AD 有效，需要 amyloid 阳性确认。</p>
      <h3>推荐流程（按优先顺序）</h3>
      <table>
        <tr><th>检查</th><th>价格</th><th>侵入性</th><th>诊断价值</th></tr>
        <tr><td>血液 p-tau217</td><td>~¥1500</td><td>抽血</td><td>amyloid 阳性 PPV ~85%</td></tr>
        <tr><td>amyloid PET</td><td>~¥6000-10000</td><td>静脉注射</td><td>金标准</td></tr>
        <tr><td>CSF Aβ42/40 + p-tau</td><td>~¥3000</td><td>腰穿</td><td>金标准</td></tr>
        <tr><td>结构 MRI 海马</td><td>~¥1200</td><td>无</td><td>辅助证据</td></tr>
      </table>
      <h3>如何转诊</h3>
      <ul>
        <li>导出本患者 30 天纵向数据 → PDF 报告（按本周报模板）</li>
        <li>转诊至神经内科 / 记忆障碍门诊</li>
        <li>携带：手套报告 + 既往 MMSE/MoCA 记录 + 用药清单</li>
      </ul>
      <div class="cite-row">📚 <a href="https://jewelina95.github.io/ad-wiki-pages/wiki/concepts/atn_framework.md" target="_blank">AT(N) 框架 ↗</a> · Jack 2024 修订标准</div>
    `;
  } else if (kind === 'intervention') {
    title = en ? `🎵 Intervention plan · ${pname}` : `🎵 干预方案 · ${pname}`;
    const enAlertTxt = (en && PATIENTS_EN[p.id] && PATIENTS_EN[p.id].alertText) || p.alertText;
    html = en ? `
      <h3>Current acute event</h3>
      <p style="color:var(--red)"><strong>${enAlertTxt || 'none'}</strong></p>
      <h3>Execute now (in order)</h3>
      <ol>
        <li><strong>Music therapy</strong>: play patient-preferred tracks (1950s songs) through the glove speaker · 30 min · monitor whether EDA subsides</li>
        <li><strong>Voice-guided breathing</strong>: 5-minute 4-7-8 technique</li>
        <li><strong>Notify primary caregiver</strong>: SMS + app push, prompt to be present</li>
        <li><strong>Environmental adjustment</strong>: dim the lights, turn off TV / strong stimuli</li>
      </ol>
      <h3>Re-check at 30 minutes</h3>
      <ul>
        <li>EDA SCL back within ±20% of baseline?</li>
        <li>HR < 80 bpm?</li>
        <li>If not resolved → escalate to in-person caregiver care + consider non-emergency medical consultation</li>
      </ul>
      <h3>Recent pattern</h3>
      <p>This patient has had 8 similar events in the past 30 days, clustering 16:30–18:00 (sundowning window). Recommend prevention in this window in advance (walks, family presence, scheduled nostalgic programmes).</p>
      <div class="cite-row">📚 <a href="https://jewelina95.github.io/ad-wiki-pages/wiki/agents/intervention_agent.md" target="_blank">intervention_agent ↗</a> · Iaboni 2022 BPSD intervention evidence</div>
    ` : `
      <h3>当前急性事件</h3>
      <p style="color:var(--red)"><strong>${p.alertText || '无'}</strong></p>
      <h3>立即执行（按顺序）</h3>
      <ol>
        <li><strong>音乐疗法</strong>：通过手套扬声器播放患者偏好曲目（50年代老歌）· 30 分钟 · 监测 EDA 是否回落</li>
        <li><strong>语音引导深呼吸</strong>：5 分钟引导式 4-7-8 呼吸法</li>
        <li><strong>通知主要看护人</strong>：短信 + App 推送，提示陪伴</li>
        <li><strong>环境调整</strong>：降低光线、关闭电视等强刺激</li>
      </ol>
      <h3>30 分钟后检查</h3>
      <ul>
        <li>EDA SCL 是否回落至基线 ±20% 内</li>
        <li>HR 是否 < 80 bpm</li>
        <li>如未缓解 → 升级至看护人现场处理 + 考虑非紧急医疗咨询</li>
      </ul>
      <h3>近期模式</h3>
      <p>该患者过去 30 天有 8 次类似事件，集中在 16:30-18:00 时段（日落综合征窗口）。建议在此时段提前预防（散步、家属陪伴、固定怀旧节目）。</p>
      <div class="cite-row">📚 <a href="https://jewelina95.github.io/ad-wiki-pages/wiki/agents/intervention_agent.md" target="_blank">intervention_agent ↗</a> · Iaboni 2022 BPSD 干预证据</div>
    `;
  }
  openModal(title, html);
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
}
